<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXELIA — 現在進行形の疑問文・演習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red: #D32F2F;
  --blue: #1A56DB;
  --blue-dark: #1446B8;
  --blue-light: #E8F0FE;
  --green: #1B873B;
  --green-light: #E6F4EA;
  --wrong: #C62828;
  --wrong-light: #FFEBEE;
  --text: #1A1A1A;
  --sub: #888;
  --border: #E8E8E8;
  --white: #FFFFFF;
  --bg: #F9F9F9;
  --purple: #7C3AED;
  --teal: #00796B;
  --teal-light: #E0F2F1;
  --orange: #E65100;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

nav {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; flex-shrink: 0;
}
.nav-logo { font-weight: 700; font-size: 20px; color: var(--red); letter-spacing: 0.08em; text-decoration: none; }
.nav-center { flex: 1; max-width: 400px; margin: 0 40px; display: flex; align-items: center; gap: 12px; }
.lesson-name { font-size: 13px; font-weight: 600; color: var(--sub); white-space: nowrap; }
.nav-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.nav-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.5s ease; }
.nav-count { font-size: 12px; font-weight: 600; color: var(--sub); white-space: nowrap; }
.btn-exit { padding: 8px 18px; border-radius: 8px; border: 1.5px solid var(--border); background: white; font-size: 13px; font-weight: 600; color: var(--sub); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; text-decoration: none; transition: border-color 0.15s, color 0.15s; }
.btn-exit:hover { border-color: #aaa; color: var(--text); }

main {
  flex: 1; display: flex; flex-direction: column;
  max-width: 680px; width: 100%; margin: 0 auto; padding: 36px 24px 28px;
}

.slide { display: none; flex-direction: column; flex: 1; animation: fadeUp 0.3s ease both; }
.slide.active { display: flex; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.quiz-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px 44px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.q-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--purple); }
.q-text  { font-size: 20px; font-weight: 700; line-height: 1.5; }
.q-sub   { font-size: 14px; color: var(--sub); line-height: 1.6; }

.q-sentence {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  font-size: 18px;
  font-weight: 700;
  text-align: center;
  letter-spacing: 0.02em;
}
.q-sentence .blank {
  display: inline-block;
  width: 80px;
  border-bottom: 2.5px solid var(--text);
  margin: 0 4px;
  vertical-align: bottom;
}

.options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: auto; }
.options.single { grid-template-columns: 1fr; }
.opt {
  padding: 16px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--white);
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  text-align: center;
  line-height: 1.5;
  transition: border-color 0.12s, background 0.12s, transform 0.1s;
}
.opt:hover:not(:disabled) { border-color: var(--blue); background: var(--blue-light); transform: translateY(-2px); }
.opt.correct { background: var(--green-light); border-color: var(--green); color: var(--green); }
.opt.wrong   { background: var(--wrong-light); border-color: var(--wrong); color: var(--wrong); text-decoration: line-through; }
.opt:disabled { cursor: default; transform: none; }

.feedback {
  padding: 14px 18px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  display: none;
  line-height: 1.75;
}
.feedback.show { display: block; }
.feedback.ok { background: var(--green-light); color: var(--green); }
.feedback.ng { background: var(--wrong-light); color: var(--wrong); }

.bottom-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
.btn-nav { padding: 12px 28px; border-radius: 10px; font-size: 14px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: all 0.15s; border: 1.5px solid var(--border); background: white; color: var(--sub); }
.btn-nav:hover:not(:disabled) { border-color: #aaa; color: var(--text); }
.btn-nav.primary { background: var(--blue); border-color: var(--blue); color: white; }
.btn-nav.primary:hover:not(:disabled) { background: var(--blue-dark); }
.btn-nav:disabled { opacity: 0.3; cursor: default; }

.dots { display: flex; gap: 7px; align-items: center; }
.dot { width: 7px; height: 7px; border-radius: 4px; background: var(--border); transition: width 0.2s, background 0.2s; }
.dot.done   { background: rgba(26,86,219,0.3); }
.dot.active { background: var(--blue); width: 22px; }

.complete-wrap {
  flex: 1; display: none; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 40px 0;
  animation: fadeUp 0.4s ease both;
}
.complete-wrap.active { display: flex; }
.complete-icon { font-size: 52px; margin-bottom: 20px; }
.complete-wrap h1 { font-size: 26px; font-weight: 700; margin-bottom: 12px; }
.score-badge { font-size: 34px; font-weight: 700; color: var(--blue); margin-bottom: 16px; }
.complete-wrap p { font-size: 15px; color: var(--sub); line-height: 1.85; margin-bottom: 32px; }
.complete-btns { display: flex; gap: 12px; }
.cbtn { padding: 13px 28px; border-radius: 10px; font-size: 14px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; text-decoration: none; transition: all 0.15s; }
.cbtn.primary { background: var(--blue); color: white; border: none; }
.cbtn.primary:hover { background: var(--blue-dark); }
.cbtn.secondary { background: white; color: var(--text); border: 1.5px solid var(--border); }
.cbtn.secondary:hover { border-color: #aaa; }

@media (max-width: 600px) {
  nav { padding: 0 16px; }
  .nav-center { display: none; }
  main { padding: 20px 16px; }
  .quiz-card { padding: 24px 18px; }
}

.btn-ask-ai {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 8px; border: 1.5px solid var(--blue);
  background: var(--blue-light); color: var(--blue); font-size: 13px;
  font-weight: 700; font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer; transition: all 0.15s; margin-top: 8px;
}
.btn-ask-ai:hover { background: var(--blue); color: white; }

.ai-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.3);
  z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.ai-overlay.open { opacity: 1; pointer-events: auto; }
.ai-panel {
  position: fixed; top: 0; right: 0; bottom: 0; width: 380px; max-width: 100vw;
  background: var(--white); box-shadow: -4px 0 24px rgba(0,0,0,0.12);
  z-index: 1000; display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform 0.3s ease;
}
.ai-panel.open { transform: translateX(0); }
.ai-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.ai-panel-title { font-size: 15px; font-weight: 700; }
.ai-panel-close {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--white); font-size: 14px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; color: var(--sub);
  transition: border-color 0.15s, color 0.15s;
}
.ai-panel-close:hover { border-color: #aaa; color: var(--text); }
.ai-panel-context {
  padding: 14px 20px; background: #f8f9fa; border-bottom: 1px solid var(--border);
  font-size: 13px; line-height: 1.7; color: var(--sub); flex-shrink: 0;
}
.ai-panel-context strong { color: var(--text); font-weight: 600; }
.ai-panel-messages {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 12px;
}
.ai-msg { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.75; }
.ai-msg.user { background: var(--blue-light); color: var(--text); align-self: flex-end; max-width: 85%; }
.ai-msg.assistant { background: #f0f0f0; color: var(--text); align-self: flex-start; max-width: 95%; white-space: pre-wrap; }
.ai-msg.loading { color: var(--sub); font-style: italic; }
.ai-panel-input {
  padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0;
  display: flex; gap: 8px; align-items: flex-end;
}
.ai-panel-input textarea {
  flex: 1; resize: none; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 10px 14px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
  line-height: 1.5; outline: none; transition: border-color 0.15s;
}
.ai-panel-input textarea:focus { border-color: var(--blue); }
.ai-panel-send {
  padding: 10px 18px; border-radius: 10px; border: none;
  background: var(--blue); color: white; font-size: 14px; font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif; cursor: pointer;
  transition: background 0.15s; flex-shrink: 0;
}
.ai-panel-send:hover { background: var(--blue-dark); }
.ai-panel-send:disabled { opacity: 0.5; cursor: default; }
@media (max-width: 600px) { .ai-panel { width: 100vw; } }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">NEXELIA</a>
  <div class="nav-center">
    <span class="lesson-name">現在進行形の疑問文 · 演習</span>
    <div class="nav-track">
      <div class="nav-fill" id="nav-fill" style="width:33%"></div>
    </div>
    <span class="nav-count" id="nav-count">1 / 3</span>
  </div>
  <a href="learning.html?lesson=lesson13" class="btn-exit">← スライドへ</a>
</nav>

<main>

  <!-- Q1: 正しい疑問文の語順 -->
  <div class="slide active" id="s0">
    <div class="quiz-card">
      <div class="q-label">問題 1 / 3</div>
      <div class="q-text">正しい疑問文はどれ？</div>
      <div class="q-sub">be動詞の位置に注目して選ぼう</div>
      <div class="options single" id="o0">
        <button class="opt" data-correct="false">They are playing soccer?</button>
        <button class="opt" data-correct="false">Do they playing soccer?</button>
        <button class="opt" data-correct="true">Are they playing soccer?</button>
      </div>
      <div class="feedback" id="f0"></div>
    </div>
    <div class="bottom-nav">
      <button class="btn-nav" style="visibility:hidden">←</button>
      <div class="dots" id="d0"></div>
      <button class="btn-nav primary" id="n0" disabled>つぎへ →</button>
    </div>
  </div>

  <!-- Q2: be動詞の穴埋め -->
  <div class="slide" id="s1">
    <div class="quiz-card">
      <div class="q-label">問題 2 / 3</div>
      <div class="q-text">（　）に入る be動詞を選ぼう</div>
      <div class="q-sub">主語に注目して考えよう</div>
      <div class="q-sentence"><span class="blank"></span> he eating lunch?</div>
      <div class="options" id="o1">
        <button class="opt" data-correct="false">Am</button>
        <button class="opt" data-correct="true">Is</button>
        <button class="opt" data-correct="false">Are</button>
        <button class="opt" data-correct="false">Do</button>
      </div>
      <div class="feedback" id="f1"></div>
    </div>
    <div class="bottom-nav">
      <button class="btn-nav" id="back1">← もどる</button>
      <div class="dots" id="d1"></div>
      <button class="btn-nav primary" id="n1" disabled>つぎへ →</button>
    </div>
  </div>

  <!-- Q3: 答え方 -->
  <div class="slide" id="s2">
    <div class="quiz-card">
      <div class="q-label">問題 3 / 3</div>
      <div class="q-text">正しい答え方はどれ？</div>
      <div class="q-sub">主語に合わせてbe動詞を使い分けよう</div>
      <div class="q-sentence">Is she playing tennis?</div>
      <div class="options single" id="o2">
        <button class="opt" data-correct="false">Yes, she do.</button>
        <button class="opt" data-correct="false">Yes, she are.</button>
        <button class="opt" data-correct="true">Yes, she is.</button>
      </div>
      <div class="feedback" id="f2"></div>
    </div>
    <div class="bottom-nav">
      <button class="btn-nav" id="back2">← もどる</button>
      <div class="dots" id="d2"></div>
      <button class="btn-nav primary" id="n2" disabled>結果を見る →</button>
    </div>
  </div>

  <!-- COMPLETE -->
  <div class="complete-wrap" id="complete">
    <div class="complete-icon" id="c-icon"></div>
    <h1 id="c-title"></h1>
    <div class="score-badge" id="c-score"></div>
    <p id="c-msg"></p>
    <div class="complete-btns">
      <a href="learning.html?lesson=lesson13" class="cbtn secondary">← スライドへ</a>
      <a href="lessons.html" class="cbtn primary">レッスン一覧へ →</a>
    </div>
  </div>

<!-- AI Chat Side Panel -->
<div class="ai-overlay" id="aiOverlay"></div>
<aside class="ai-panel" id="aiChatPanel">
  <div class="ai-panel-header">
    <span class="ai-panel-title">🤖 AIに質問</span>
    <button class="ai-panel-close" id="aiPanelClose" type="button" aria-label="閉じる">✕</button>
  </div>
  <div class="ai-panel-context" id="aiPanelContext"></div>
  <div class="ai-panel-messages" id="aiPanelMessages"></div>
  <form class="ai-panel-input" id="aiPanelForm">
    <textarea id="aiPanelQuestion" placeholder="質問を入力してください..." rows="2"></textarea>
    <button type="submit" class="ai-panel-send" id="aiPanelSend">送信</button>
  </form>
</aside>

</main>

<script>
  const TOTAL = 3;
  let cur = 0;
  let correct = 0;
  const answered = {};

  const FB = [
    { ok: '✓ 正解！現在進行形の疑問文は be動詞を文頭に出します。Are they playing soccer? が正しい語順です。', ng: '✗ 惜しい！現在進行形の疑問文は be動詞を文頭に出します。正しくは Are they playing soccer? です。' },
    { ok: '✓ 正解！主語が he のとき、be動詞は is です。疑問文では文頭に出して Is he eating lunch? になります。', ng: '✗ 惜しい！主語が he のとき、be動詞は is です。疑問文では文頭に出して Is he eating lunch? になります。' },
    { ok: '✓ 正解！主語が she なので be動詞は is。Yes, she is. が正しい答え方です。', ng: '✗ 惜しい！主語が she なので be動詞は is を使います。正しくは Yes, she is. です。' },
  ];

  function renderDots(id) {
    const el = document.getElementById('d' + id);
    if (!el) return;
    el.innerHTML = '';
    for (let i = 0; i < TOTAL; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i < id ? ' done' : i === id ? ' active' : '');
      el.appendChild(d);
    }
  }

  function go(idx) {
    document.getElementById('s' + cur).classList.remove('active');
    cur = idx;
    document.getElementById('s' + cur).classList.add('active');
    document.getElementById('nav-fill').style.width = ((cur + 1) / TOTAL * 100) + '%';
    document.getElementById('nav-count').textContent = (cur + 1) + ' / ' + TOTAL;
    renderDots(cur);
  }

  function finish() {
    document.getElementById('s2').classList.remove('active');
    document.getElementById('complete').classList.add('active');
    document.getElementById('nav-fill').style.width = '100%';
    document.getElementById('nav-count').textContent = '完了';
    document.getElementById('c-score').textContent = correct + ' / ' + TOTAL + ' 問正解';

    if (correct === 3) {
      document.getElementById('c-icon').textContent = '🎉';
      document.getElementById('c-title').textContent = '全問正解！';
      document.getElementById('c-msg').innerHTML = '現在進行形の疑問文、完璧です！<br>Unit 3 完了です！';
    } else if (correct === 2) {
      document.getElementById('c-icon').textContent = '✓';
      document.getElementById('c-title').textContent = 'もう少し！';
      document.getElementById('c-msg').innerHTML = 'スライドをもう一度確認して<br>再チャレンジしよう。';
    } else {
      document.getElementById('c-icon').textContent = '📖';
      document.getElementById('c-title').textContent = 'スライドを見直そう';
      document.getElementById('c-msg').innerHTML = '現在進行形の疑問文をスライドで<br>もう一度確認してから再チャレンジしよう。';
    }
  }

  for (var q = 0; q < TOTAL; q++) {
    (function(qIdx) {
      const opts = document.querySelectorAll('#o' + qIdx + ' .opt');
      opts.forEach(function(btn) {
        btn.addEventListener('click', function() {
          if (answered[qIdx]) return;
          answered[qIdx] = true;

          const isCorrect = btn.dataset.correct === 'true';
          if (isCorrect) correct++;

          opts.forEach(function(b) {
            b.disabled = true;
            if (b.dataset.correct === 'true') b.classList.add('correct');
          });
          if (!isCorrect) btn.classList.add('wrong');

          const fb = document.getElementById('f' + qIdx);
          fb.classList.add('show', isCorrect ? 'ok' : 'ng');
          fb.textContent = isCorrect ? FB[qIdx].ok : FB[qIdx].ng;

          // AIに質問ボタンを追加
          if (!fb.parentElement.querySelector('.btn-ask-ai')) {
            var qText = document.querySelector('#s' + qIdx + ' .q-text');
            var aiBtn = document.createElement('button');
            aiBtn.type = 'button';
            aiBtn.className = 'btn-ask-ai';
            aiBtn.textContent = '🤖 AIに質問';
            (function(questionText, selectedText, correctText, wasCorrect, feedbackText) {
              aiBtn.addEventListener('click', function() {
                openAiPanel(questionText, selectedText, correctText, wasCorrect, feedbackText);
              });
            })(
              qText ? qText.textContent : '',
              btn.textContent,
              Array.from(opts).find(function(b) { return b.dataset.correct === 'true'; }).textContent,
              isCorrect,
              isCorrect ? FB[qIdx].ok : FB[qIdx].ng
            );
            fb.insertAdjacentElement('afterend', aiBtn);
          }

          document.getElementById('n' + qIdx).disabled = false;
        });
      });
    })(q);
  }

  document.getElementById('n0').addEventListener('click', function() { go(1); });
  document.getElementById('n1').addEventListener('click', function() { go(2); });
  document.getElementById('n2').addEventListener('click', function() { finish(); });
  document.getElementById('back1').addEventListener('click', function() { go(0); });
  document.getElementById('back2').addEventListener('click', function() { go(1); });

  renderDots(0);

  // ── AI Chat Panel ──
  function openAiPanel(questionText, selectedText, correctText, wasCorrect, feedbackText) {
    var panel = document.getElementById('aiChatPanel');
    var overlay = document.getElementById('aiOverlay');
    var contextEl = document.getElementById('aiPanelContext');
    var messagesEl = document.getElementById('aiPanelMessages');
    contextEl.innerHTML = '<strong>問題:</strong> ' + questionText +
      '<br><strong>あなたの回答:</strong> ' + selectedText +
      '<br><strong>正解:</strong> ' + correctText +
      '<br><strong>結果:</strong> ' + (wasCorrect ? '正解' : '不正解');
    messagesEl.innerHTML = '';
    panel.classList.add('open');
    overlay.classList.add('open');
    var input = document.getElementById('aiPanelQuestion');
    setTimeout(function() { input.focus(); }, 350);
    window._aiContext = '問題: ' + questionText + ' / あなたの回答: ' + selectedText +
      ' / 正解: ' + correctText + ' / 結果: ' + (wasCorrect ? '正解' : '不正解');
  }

  document.getElementById('aiPanelClose').addEventListener('click', function() {
    document.getElementById('aiChatPanel').classList.remove('open');
    document.getElementById('aiOverlay').classList.remove('open');
  });
  document.getElementById('aiOverlay').addEventListener('click', function() {
    document.getElementById('aiChatPanel').classList.remove('open');
    document.getElementById('aiOverlay').classList.remove('open');
  });

  document.getElementById('aiPanelForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var input = document.getElementById('aiPanelQuestion');
    var q = input.value.trim();
    if (!q) return;

    var messagesEl = document.getElementById('aiPanelMessages');
    var sendBtn = document.getElementById('aiPanelSend');

    var userMsg = document.createElement('div');
    userMsg.className = 'ai-msg user';
    userMsg.textContent = q;
    messagesEl.appendChild(userMsg);

    input.value = '';
    sendBtn.disabled = true;

    var loadingMsg = document.createElement('div');
    loadingMsg.className = 'ai-msg assistant loading';
    loadingMsg.textContent = '回答を生成中...';
    messagesEl.appendChild(loadingMsg);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    fetch('/.netlify/functions/ai-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, context: window._aiContext || '' })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      loadingMsg.classList.remove('loading');
      loadingMsg.textContent = data.answer || '回答を取得できませんでした。';
      sendBtn.disabled = false;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    })
    .catch(function() {
      loadingMsg.classList.remove('loading');
      loadingMsg.textContent = 'エラーが発生しました。もう一度お試しください。';
      sendBtn.disabled = false;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  });
</script>
</body>
</html>
