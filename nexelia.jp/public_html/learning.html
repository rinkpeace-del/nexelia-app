<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NEXELIA 学習ページ" />
  <title>学習 | NEXELIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    * { -webkit-font-smoothing: antialiased; }

    :root {
      --red: #D32F2F;
      --blue: #1A56DB;
      --blue-dark: #1446B8;
      --blue-light: #E8F0FE;
      --text: #1A1A1A;
      --sub: #888;
      --border: #E8E8E8;
      --white: #FFFFFF;
      --bg: #F9F9F9;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      flex-shrink: 0;
    }

    .nav-logo {
      font-weight: 700;
      font-size: 20px;
      color: var(--red);
      letter-spacing: 0.08em;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav-center {
      flex: 1;
      max-width: 400px;
      margin: 0 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      overflow: hidden;
    }

    .lesson-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
      flex-shrink: 0;
    }

    .nav-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      min-width: 60px;
    }

    .nav-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 2px;
      transition: width 0.4s ease;
      width: 0;
    }

    .nav-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--sub);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-exit {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .btn-exit:hover { border-color: #aaa; color: var(--text); }

    /* ── HIDDEN COMPAT ELEMENTS (learning.js needs these) ── */
    .progress-row { display: none; }
    .toc-panel    { display: none; }
    .fullscreen-toggle { display: none; }
    .current-path { display: none; }
    .feedback     { display: none; }

    /* ── MAIN ── */
    main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 36px 24px 28px;
    }

    .learning-card {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .stage-shell {
      flex: 1;
      min-height: 0;
      display: flex;
    }

    .stage-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── STEP CONTENT (= slide-card) ── */
    .step-content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    /* Slide step */
    .stage-wrap[data-step-type="slide"] .step-content {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 48px 56px;
      gap: 28px;
    }

    /* iframe slide: no padding, fill edge to edge */
    .stage-wrap[data-step-type="slide"] .step-content:has(.slide-embed) {
      padding: 0;
      overflow: hidden;
    }

    .step-content > section {
      width: 100%;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Question step */
    .stage-wrap[data-step-type="question"] .step-content {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 48px;
      overflow-y: auto;
    }

    .stage-wrap[data-step-type="question"] .step-content > section {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ── SLIDE MEDIA ── */
    .slide-image {
      display: block;
      width: 100%;
      height: auto;
      max-width: 100%;
    }

    .slide-embed {
      width: 100%;
      border: 0;
      display: block;
    }
    .slide-embed.pdf-static { pointer-events: none; }

    /* ── STEP TITLE / TEXT ── */
    .step-title { display: none; }
    .step-text  { display: none; }

    .stage-wrap[data-step-type="question"] .step-content .step-title {
      display: block;
      font-size: clamp(1.1rem, 2.5vw, 1.35rem);
      font-weight: 800;
      color: var(--text);
      text-align: center;
      margin-bottom: 8px;
    }
    .stage-wrap[data-step-type="question"] .step-content .step-text {
      display: block;
      color: var(--sub);
      font-size: 0.88rem;
      text-align: center;
      margin-bottom: 4px;
    }

    /* ── QUESTION UI ── */
    .question-text {
      font-size: clamp(1rem, 2.2vw, 1.1rem);
      font-weight: 700;
      line-height: 1.65;
      text-align: center;
      color: var(--text);
      margin-bottom: 24px;
    }
    .question-line-main {
      display: block;
      color: var(--sub);
      font-size: 0.9em;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .question-line-emphasis {
      display: block;
      font-size: 1.2em;
      font-weight: 800;
      color: var(--text);
      line-height: 1.35;
    }

    .stage-wrap[data-step-type="question"] .step-content .question-text {
      font-size: 2rem;
      font-weight: 900;
      color: var(--blue);
      margin-bottom: 20px;
    }

    .choices {
      display: grid;
      gap: 10px;
      max-width: 480px;
      margin: 0 auto 16px;
      width: 100%;
    }

    .choice-item {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      background: var(--white);
      font-size: 0.97rem;
      font-weight: 600;
      color: #334155;
      transition: border-color 0.15s, background 0.15s;
    }
    .choice-item:hover { border-color: #93c5fd; background: #eff6ff; }
    .choice-item input[type="radio"] { width: 16px; height: 16px; flex-shrink: 0; accent-color: var(--blue); }

    .inline-explanation {
      font-size: 0.88rem;
      line-height: 1.65;
      color: var(--sub);
      margin: 0;
      min-height: 1.2em;
    }
    .inline-explanation.ok { color: #16a34a; font-weight: 700; }
    .inline-explanation.ng { color: #dc2626; font-weight: 700; }

    .question-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
      width: 100%;
    }

    .question-actions .nav-row {
      width: 100%;
      justify-content: space-between;
    }

    /* ── BOTTOM NAV ── */
    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    /* ── DOTS ── */
    .dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 3px;
      background: var(--border);
      border: none;
      padding: 0;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      transition: width 0.2s, background 0.2s;
    }
    .dot.done   { background: rgba(26,86,219,0.3); }
    .dot.active { background: var(--blue); width: 20px; }

    /* hide dots in question steps */
    .stage-wrap[data-step-type="question"] .dots { display: none; }

    /* ── BUTTONS ── */
    .btn-nav {
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--sub);
      white-space: nowrap;
    }
    .btn-nav:hover:not(:disabled) { border-color: #aaa; color: var(--text); }
    .btn-nav.primary {
      background: var(--blue);
      border-color: var(--blue);
      color: var(--white);
    }
    .btn-nav.primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); }
    .btn-nav:disabled { opacity: 0.3; cursor: default; }

    /* learning.js も .btn-primary / .btn-small を使うので alias */
    .btn-primary {
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      border: 1.5px solid var(--blue);
      background: var(--blue);
      color: var(--white);
      transition: all 0.15s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }
    .btn-primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); }
    .btn-primary:disabled { opacity: 0.4; pointer-events: none; }

    .btn-small {
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--sub);
      transition: all 0.15s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-small:hover { border-color: #aaa; color: var(--text); }
    .btn-small:disabled { opacity: 0.3; pointer-events: none; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInNext {
      from { opacity: 0; transform: translateX(24px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInPrev {
      from { opacity: 0; transform: translateX(-24px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .step-content.anim-next { animation: slideInNext 0.22s ease; }
    .step-content.anim-prev { animation: slideInPrev 0.22s ease; }

    /* ── SLIDE MODE (fullscreen) ── */
    body.slide-mode { background: #000; overflow: hidden; }
    body.slide-mode nav { display: none; }
    body.slide-mode main { max-width: 100%; padding: 0; height: 100vh; }
    body.slide-mode .stage-wrap[data-step-type="slide"] .step-content {
      border-radius: 0; border: 0; background: #000;
    }
    body.slide-mode .slide-image { object-fit: contain; max-height: 100vh; }
    body.slide-mode .nav-row {
      position: fixed; bottom: 14px; right: 14px;
      background: transparent; z-index: 100;
    }
    body.slide-mode #prevBtn { position: fixed; bottom: 14px; left: 14px; }

    /* ── AI CHAT PANEL ── */
    .ai-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3);
      z-index: 999; opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .ai-overlay.open { opacity: 1; pointer-events: auto; }

    .ai-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 380px; max-width: 100vw;
      background: var(--white); box-shadow: -4px 0 24px rgba(0,0,0,0.12);
      z-index: 1000; display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform 0.3s ease;
    }
    .ai-panel.open { transform: translateX(0); }

    .ai-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .ai-panel-title { font-size: 15px; font-weight: 700; }
    .ai-panel-close {
      width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--white); font-size: 14px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; color: var(--sub);
      transition: border-color 0.15s, color 0.15s;
    }
    .ai-panel-close:hover { border-color: #aaa; color: var(--text); }

    .ai-panel-context {
      padding: 14px 20px; background: #f8f9fa; border-bottom: 1px solid var(--border);
      font-size: 13px; line-height: 1.7; color: var(--sub); flex-shrink: 0;
    }
    .ai-panel-context strong { color: var(--text); font-weight: 600; }

    .ai-panel-messages {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .ai-msg { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.75; }
    .ai-msg.user { background: var(--blue-light); color: var(--text); align-self: flex-end; max-width: 85%; }
    .ai-msg.assistant { background: #f0f0f0; color: var(--text); align-self: flex-start; max-width: 95%; white-space: pre-wrap; }
    .ai-msg.loading { color: var(--sub); font-style: italic; }

    .ai-panel-input {
      padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0;
      display: flex; gap: 8px; align-items: flex-end;
    }
    .ai-panel-input textarea {
      flex: 1; resize: none; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 10px 14px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
      line-height: 1.5; outline: none; transition: border-color 0.15s;
    }
    .ai-panel-input textarea:focus { border-color: var(--blue); }
    .ai-panel-send {
      padding: 10px 18px; border-radius: 10px; border: none;
      background: var(--blue); color: white; font-size: 14px; font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif; cursor: pointer;
      transition: background 0.15s; flex-shrink: 0;
    }
    .ai-panel-send:hover { background: var(--blue-dark); }
    .ai-panel-send:disabled { opacity: 0.5; cursor: default; }

    .btn-ask-ai {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px; border: 1.5px solid var(--blue);
      background: var(--blue-light); color: var(--blue); font-size: 13px;
      font-weight: 700; font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer; transition: all 0.15s; margin-top: 8px;
    }
    .btn-ask-ai:hover { background: var(--blue); color: white; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      nav { padding: 0 16px; }
      .nav-center { display: none; }
      main { padding: 20px 16px; }
      .stage-wrap[data-step-type="slide"] .step-content { padding: 24px 20px; }
      .stage-wrap[data-step-type="question"] .step-content { padding: 24px 20px; }
      .btn-nav, .btn-primary, .btn-small { padding: 11px 16px; font-size: 13px; }
      .ai-panel { width: 100vw; }
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <a href="lessons.html" class="nav-logo">NEXELIA</a>
    <div class="nav-center">
      <h1 class="lesson-name" id="lessonTitle">読み込み中…</h1>
      <div
        class="nav-track"
        id="slideProgress"
        role="progressbar"
        aria-label="スライド進捗"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
      ><div class="nav-fill" id="slideProgressFill"></div></div>
      <span class="nav-count" id="progressText"></span>
    </div>
    <a href="lessons.html" class="btn-exit">← 一覧へ</a>
  </nav>

  <!-- Hidden compat elements required by learning.js -->
  <div class="progress-row" style="display:none">
    <p class="current-path" id="currentPath"></p>
    <div>
      <button
        id="fullscreenToggle"
        class="fullscreen-toggle"
        type="button"
        aria-pressed="false"
        aria-label="全画面"
        data-state="expand"
        style="display:none"
      ><span class="fullscreen-icon" aria-hidden="true"></span></button>
    </div>
  </div>

  <aside class="toc-panel" id="tocPanel" aria-label="目次" style="display:none">
    <p class="toc-title">目次</p>
    <ol class="toc-list" id="tocList"></ol>
  </aside>

  <!-- MAIN -->
  <main>
    <section class="learning-card" aria-live="polite">
      <div class="stage-shell">
        <div class="stage-wrap" id="stageWrap" data-step-type="slide">

          <article class="step-content" id="stepContent"></article>

          <nav class="nav-row" id="navRow" aria-label="ナビゲーション">
            <button id="prevBtn" class="btn-nav" type="button" aria-label="前へ">← もどる</button>
            <div class="dots" id="dotsContainer"></div>
            <button id="nextBtn" class="btn-nav primary" type="button" aria-label="次へ">つぎへ →</button>
            <button id="exerciseBtn" class="btn-nav primary" type="button" hidden aria-hidden="true">演習へ</button>
          </nav>

        </div>
      </div>

      <p class="feedback" id="feedbackText" style="display:none"></p>
    </section>
  </main>

  <!-- AI Chat Side Panel -->
  <div class="ai-overlay" id="aiOverlay"></div>
  <aside class="ai-panel" id="aiChatPanel">
    <div class="ai-panel-header">
      <span class="ai-panel-title">🤖 AIに質問</span>
      <button class="ai-panel-close" id="aiPanelClose" type="button" aria-label="閉じる">✕</button>
    </div>
    <div class="ai-panel-context" id="aiPanelContext"></div>
    <div class="ai-panel-messages" id="aiPanelMessages"></div>
    <form class="ai-panel-input" id="aiPanelForm">
      <textarea id="aiPanelQuestion" placeholder="質問を入力してください..." rows="2"></textarea>
      <button type="submit" class="ai-panel-send" id="aiPanelSend">送信</button>
    </form>
  </aside>

  <script src="learning.js?v=20260312-2"></script>

  <!-- iframe auto-resize: スライドの中身に合わせてiframeの高さを調整 -->
  <script>
    (function () {
      const stepContent = document.getElementById('stepContent');
      if (!stepContent) return;

      function getDocHeight(doc) {
        const body = doc.body;
        const root = doc.documentElement;
        return Math.max(
          body ? body.scrollHeight : 0,
          body ? body.offsetHeight : 0,
          body ? body.clientHeight : 0,
          root ? root.scrollHeight : 0,
          root ? root.offsetHeight : 0,
          root ? root.clientHeight : 0
        );
      }

      function lockInnerScroll(doc) {
        const root = doc.documentElement;
        const body = doc.body;
        if (root) {
          root.style.overflow = 'hidden';
          root.style.scrollbarWidth = 'none';
        }
        if (body) {
          body.style.overflow = 'hidden';
          body.style.scrollbarWidth = 'none';
        }
      }

      function resizeIframe(iframe) {
        try {
          const doc = iframe.contentDocument;
          if (!doc) return;
          lockInnerScroll(doc);
          const h = getDocHeight(doc);
          if (h > 0) iframe.style.height = h + 'px';
        } catch (e) {}
      }

      const iframeObserver = new MutationObserver(function () {
        const iframe = stepContent.querySelector('.slide-embed');
        if (!iframe || iframe.dataset.resizeBound === '1') return;

        iframe.dataset.resizeBound = '1';
        iframe.setAttribute('scrolling', 'no');
        iframe.style.overflow = 'hidden';

        const onLoad = function () {
          resizeIframe(iframe);
          try {
            const doc = iframe.contentDocument;
            if (!doc) return;

            new ResizeObserver(function () { resizeIframe(iframe); }).observe(doc.documentElement);
            if (doc.body) {
              new ResizeObserver(function () { resizeIframe(iframe); }).observe(doc.body);
            }
          } catch (e) {}
        };

        iframe.addEventListener('load', onLoad);
        if (iframe.contentDocument && iframe.contentDocument.readyState === 'complete') {
          onLoad();
        }
      });

      iframeObserver.observe(stepContent, { childList: true, subtree: true });
    })();
  </script>

  <!-- Dots renderer: progressText の変化を監視してドットを更新 -->
  <script>
    (function () {
      const dotsEl = document.getElementById('dotsContainer');
      const progressEl = document.getElementById('progressText');

      function renderDots(current, total) {
        if (!dotsEl || total < 2) { if (dotsEl) dotsEl.innerHTML = ''; return; }
        const frag = document.createDocumentFragment();
        for (let i = 0; i < total; i++) {
          const d = document.createElement('button');
          d.type = 'button';
          d.className = 'dot' + (i < current - 1 ? ' done' : i === current - 1 ? ' active' : '');
          d.setAttribute('aria-label', 'Go to slide ' + (i + 1) + ' of ' + total);
          d.title = (i + 1) + ' / ' + total;
          d.addEventListener('click', function () {
            if (typeof window.jumpToStep === 'function') {
              window.jumpToStep(i);
            }
          });
          frag.appendChild(d);
        }
        dotsEl.replaceChildren(frag);
      }

      function parseAndRender() {
        const text = progressEl ? progressEl.textContent.trim() : '';
        const m = text.match(/^(\d+)\s*\/\s*(\d+)$/);
        if (m) renderDots(Number(m[1]), Number(m[2]));
        else if (dotsEl) dotsEl.innerHTML = '';
      }

      if (progressEl) {
        const obs = new MutationObserver(parseAndRender);
        obs.observe(progressEl, { childList: true, subtree: true, characterData: true });
      }
    })();
  </script>
</body>
</html>
