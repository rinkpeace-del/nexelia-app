<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #D32F2F;
  --blue: #1A56DB;
  --blue-dark: #1446B8;
  --blue-light: #E8F0FE;
  --green: #1B873B;
  --green-light: #E6F4EA;
  --wrong: #C62828;
  --wrong-light: #FFEBEE;
  --text: #1A1A1A;
  --sub: #888;
  --border: #E8E8E8;
  --white: #FFFFFF;
  --bg: #F9F9F9;
  --purple: #7B3FF2;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
nav {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  flex-shrink: 0;
}
.nav-logo {
  font-weight: 700;
  font-size: 20px;
  color: var(--red);
  letter-spacing: 0.08em;
  text-decoration: none;
}
.nav-center {
  flex: 1;
  max-width: 440px;
  margin: 0 40px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.lesson-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--sub);
  white-space: nowrap;
}
.nav-track {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.nav-fill {
  height: 100%;
  background: var(--blue);
  border-radius: 2px;
  transition: width 0.3s ease;
}
.nav-count {
  font-size: 12px;
  font-weight: 600;
  color: var(--sub);
  white-space: nowrap;
}
.btn-exit {
  padding: 8px 18px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: white;
  font-size: 13px;
  font-weight: 600;
  color: var(--sub);
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  text-decoration: none;
  transition: border-color 0.15s, color 0.15s;
}
.btn-exit:hover { border-color: #aaa; color: var(--text); }
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 680px;
  width: 100%;
  margin: 0 auto;
  padding: 36px 24px 28px;
}
.quiz-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px 44px;
  flex: 1;
  display: flex;
  flex-direction: column;
  animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.q-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--purple);
  margin-bottom: 24px;
}
.q-text {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.5;
  margin-bottom: 8px;
}
.q-sub {
  font-size: 14px;
  color: var(--sub);
  margin-bottom: 28px;
  line-height: 1.6;
}
.sentence-box {
  background: #E8F0FE;
  border-radius: 10px;
  padding: 14px 20px;
  font-size: 22px;
  font-weight: 700;
  color: #1A56DB;
  margin-bottom: 28px;
  line-height: 1.6;
  letter-spacing: 0.02em;
}
.blank {
  display: inline-block;
  width: 60px;
  border-bottom: 2.5px solid #1A56DB;
  margin: 0 4px;
  vertical-align: bottom;
}
.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: auto;
}
.opt {
  padding: 18px 16px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--white);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  text-align: center;
  line-height: 1.4;
  transition: border-color 0.12s, background 0.12s, transform 0.1s;
}
.opt:hover:not(:disabled) { border-color: var(--blue); background: var(--blue-light); transform: translateY(-2px); }
.opt.correct { background: var(--green-light); border-color: var(--green); color: var(--green); }
.opt.wrong { background: var(--wrong-light); border-color: var(--wrong); color: var(--wrong); text-decoration: line-through; }
.opt:disabled { cursor: default; transform: none; }
.opt-sub {
  display: block;
  font-size: 12px;
  font-weight: 400;
  margin-top: 4px;
  color: var(--sub);
}
.feedback {
  margin-top: 16px;
  padding: 14px 18px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  line-height: 1.75;
  display: none;
}
.feedback.show { display: block; }
.feedback.ok { background: var(--green-light); color: var(--green); }
.feedback.ng { background: var(--wrong-light); color: var(--wrong); }
.bottom-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 20px;
}
.btn-nav {
  padding: 12px 28px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  border: 1.5px solid var(--border);
  background: white;
  color: var(--sub);
}
.btn-nav:hover:not(:disabled) { border-color: #aaa; color: var(--text); }
.btn-nav.primary { background: var(--blue); border-color: var(--blue); color: white; }
.btn-nav.primary:hover:not(:disabled) { background: var(--blue-dark); border-color: var(--blue-dark); color: white; }
.btn-nav:disabled { opacity: 0.3; cursor: default; }
.dots { display: flex; gap: 7px; align-items: center; }
.dot { width: 7px; height: 7px; border-radius: 4px; background: var(--border); transition: width 0.2s, background 0.2s; }
.dot.done { background: rgba(26,86,219,0.3); }
.dot.active { background: var(--blue); width: 22px; }
.complete-wrap {
  flex: 1;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 0;
  animation: fadeUp 0.4s ease both;
}
.complete-wrap.active { display: flex; }
.complete-icon { font-size: 52px; margin-bottom: 20px; }
.complete-wrap h1 { font-size: 26px; font-weight: 700; margin-bottom: 12px; }
.complete-score { font-size: 34px; font-weight: 700; color: var(--blue); margin-bottom: 16px; }
.complete-wrap p { font-size: 15px; color: var(--sub); line-height: 1.85; margin-bottom: 32px; white-space: pre-line; }
.complete-btns { display: flex; gap: 12px; }
.cbtn {
  padding: 13px 28px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  text-decoration: none;
  transition: all 0.15s;
}
.cbtn.primary { background: var(--blue); color: white; border: none; }
.cbtn.primary:hover { background: var(--blue-dark); }
.cbtn.secondary { background: white; color: var(--text); border: 1.5px solid var(--border); }
.cbtn.secondary:hover { border-color: #aaa; }
.error-box {
  background: #fff4f4;
  border: 1px solid #ffcaca;
  color: #a92b2b;
  border-radius: 12px;
  padding: 16px;
  font-size: 14px;
}
@media (max-width: 600px) {
  nav { padding: 0 16px; }
  .nav-center { display: none; }
  main { padding: 24px 16px; }
  .quiz-card { padding: 28px 20px; }
  .options { grid-template-columns: 1fr; }
  .complete-btns { flex-direction: column; width: 100%; }
  .cbtn { text-align: center; }
  .ai-panel { width: 100vw; }
}

.btn-ask-ai {
  position: fixed; bottom: 16px; left: 24px; z-index: 900;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 18px; border-radius: 24px; border: none;
  background: var(--blue); color: white; font-size: 14px;
  font-weight: 700; font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer; transition: all 0.15s;
  box-shadow: 0 4px 16px rgba(26,86,219,0.35);
}
.btn-ask-ai:hover { background: var(--blue-dark); transform: translateY(-2px); }
.ai-overlay {
  position: fixed; inset: 0; background: transparent;
  z-index: 999; pointer-events: none;
}
.ai-overlay.open { pointer-events: auto; }
.ai-panel {
  position: fixed; top: 0; left: 0; bottom: 0; width: 300px; max-width: 90vw;
  background: var(--white); box-shadow: 4px 0 24px rgba(0,0,0,0.12);
  z-index: 1000; display: flex; flex-direction: column;
  transform: translateX(-100%); transition: transform 0.3s ease;
}
.ai-panel.open { transform: translateX(0); }
body { transition: padding-left 0.3s ease; }
body.ai-open { padding-left: 300px; }
.ai-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.ai-panel-title { font-size: 15px; font-weight: 700; }
.ai-panel-close {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--white); font-size: 14px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; color: var(--sub);
  transition: border-color 0.15s, color 0.15s;
}
.ai-panel-close:hover { border-color: #aaa; color: var(--text); }
.ai-panel-context {
  padding: 14px 20px; background: #f8f9fa; border-bottom: 1px solid var(--border);
  font-size: 13px; line-height: 1.7; color: var(--sub); flex-shrink: 0;
}
.ai-panel-context strong { color: var(--text); font-weight: 600; }
.ai-panel-messages {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 12px;
}
.ai-msg { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.75; }
.ai-msg.user { background: var(--blue-light); color: var(--text); align-self: flex-end; max-width: 85%; }
.ai-msg.assistant { background: #f0f0f0; color: var(--text); align-self: flex-start; max-width: 95%; white-space: pre-wrap; }
.ai-msg.loading { color: var(--sub); font-style: italic; }
.ai-panel-input {
  padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0;
  display: flex; gap: 8px; align-items: flex-end;
}
.ai-panel-input textarea {
  flex: 1; resize: none; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 10px 14px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
  line-height: 1.5; outline: none; transition: border-color 0.15s;
}
.ai-panel-input textarea:focus { border-color: var(--blue); }
.ai-panel-send {
  padding: 10px 18px; border-radius: 10px; border: none;
  background: var(--blue); color: white; font-size: 14px; font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif; cursor: pointer;
  transition: background 0.15s; flex-shrink: 0;

.ai-panel-send:hover { background: var(--blue-dark); }
.ai-panel-send:disabled { opacity: 0.5; cursor: default; }
</style>

  const LESSON_EXERCISE_MAP = {
    lesson1: 'lesson1q',
    lesson3: 'lesson3q',
    lesson5: 'lesson5q',
    lesson6: 'lesson6q',

    lesson16: 'lesson16q',
    lesson17: 'lesson17q',
    lesson18: 'lesson18q',
    lesson20: 'lesson20q'
  };

  const SOURCE_LESSON_MAP = {
    lesson1q: 'lesson1',
    lesson3q: 'lesson3',
    lesson5q: 'lesson5',
    lesson6q: 'lesson6',
    lesson8q: 'lesson8',
    lesson9q: 'lesson9',
    lesson10q: 'lesson10',
    lesson12q: 'lesson12',
    lesson13q: 'lesson13',
    lesson14q: 'lesson14',
    lesson15q: 'lesson15',
    lesson16q: 'lesson16',
    lesson17q: 'lesson17',
    lesson18q: 'lesson18',
    lesson20q: 'lesson20'
  };

  const exerciseLessonId = LESSON_EXERCISE_MAP[requestedLessonId] || requestedLessonId;
  const sourceLessonId = SOURCE_LESSON_MAP[exerciseLessonId] || requestedLessonId;

  const el = {
    lessonName: document.getElementById('lesson-name'),
    navFill: document.getElementById('nav-fill'),
    navCount: document.getElementById('nav-count'),
    btnExit: document.getElementById('btn-exit'),
    quiz: document.getElementById('quiz'),
    qLabel: document.getElementById('q-label'),
    qText: document.getElementById('q-text'),
    qSub: document.getElementById('q-sub'),
    sentenceWrap: document.getElementById('sentence-wrap'),
    opts: document.getElementById('opts'),
    fb: document.getElementById('fb'),
    btnPrev: document.getElementById('btn-prev'),
    btnNext: document.getElementById('btn-next'),
    dots: document.getElementById('dots'),
    bottomNav: document.getElementById('bottom-nav'),
    complete: document.getElementById('complete'),
    cIcon: document.getElementById('c-icon'),
    cTitle: document.getElementById('c-title'),
    cScore: document.getElementById('c-score'),
    cMsg: document.getElementById('c-msg'),
    cBack: document.getElementById('c-back'),
    error: document.getElementById('error')
  };

  let model = { title: '演習', questions: [] };
  let currentQ = 0;
  let selected = null;
  let answered = false;
  let correctCount = 0;
  // 各問題ごとの回答状態を記録（二重カウント防止）
  const questionState = {}; // { [index]: { selected, answered, correct } }

  function normalizeQuestion(raw) {
    return {
      question: String(raw.question || '問題'),
      subText: String(raw.subText || raw.hint || '正しいものを1つ選ぼう'),
      sentence: String(raw.sentence || ''),
      choices: Array.isArray(raw.choices) ? raw.choices.map((c) => String(c).replace(/\\n/g, "\n")) : [],
      answer: Number.isFinite(Number(raw.answer)) ? Number(raw.answer) : Number(raw.correctAnswer || 0),
      explanation: String(raw.explanation || ''),
      wrongExplanation: String(raw.wrongExplanation || ''),
      choicesColumns: raw.choicesColumns || null
    };
  }

  async function loadModel() {
    try {
      const res = await fetch('lessons-data.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('lessons-data.json の取得に失敗しました。');
      const data = await res.json();
      const lessons = Array.isArray(data.lessons) ? data.lessons : [];
      const lesson = lessons.find((l) => l.id === exerciseLessonId) || lessons.find((l) => l.id === requestedLessonId);

      if (!lesson) {
        if (FALLBACK[exerciseLessonId]) return FALLBACK[exerciseLessonId];
        throw new Error('演習データが見つかりません。');
      }

      const steps = Array.isArray(lesson.steps) ? lesson.steps : [];
      const questionSteps = steps.filter((s) => {
        const t = String(s.type || '').toLowerCase();
        return t === 'question' || t === 'exercise';
      }).map(normalizeQuestion).filter((q) => q.choices.length > 0);

      if (questionSteps.length > 0) {
        return { title: lesson.title || '演習', questions: questionSteps };
      }

      if (FALLBACK[exerciseLessonId]) return FALLBACK[exerciseLessonId];
      throw new Error('このレッスンには演習問題がありません。');
    } catch (err) {
      if (FALLBACK[exerciseLessonId]) return FALLBACK[exerciseLessonId];
      throw err;
    }
  }

  function splitOption(text) {
    const parts = String(text).split('\n');
    return { main: parts[0] || '', sub: parts.slice(1).join('\n') };
  }

  function renderDots() {
    const total = model.questions.length;
    el.dots.innerHTML = '';
    for (let i = 0; i < total; i += 1) {
      const d = document.createElement('div');
      d.className = 'dot' + (i < currentQ ? ' done' : i === currentQ ? ' active' : '');
      el.dots.appendChild(d);
    }
  }

  function renderNavProgress() {
    const total = model.questions.length;
    const progress = ((currentQ + (answered ? 1 : 0)) / total) * 100;
    el.navFill.style.width = `${Math.max(0, Math.min(100, progress))}%`;
    el.navCount.textContent = `${currentQ + 1} / ${total}`;
  }

  function renderSentence(sentence) {
    el.sentenceWrap.innerHTML = '';
    if (!sentence) return;

    const box = document.createElement('div');
    box.className = 'sentence-box';

    if (sentence.includes('___')) {
      const parts = sentence.split('___');
      const blank = '<span class="blank"></span>';
      box.innerHTML = `${parts[0]}${blank}${parts[1] || ''}`;
    } else {
      box.textContent = sentence;
    }

    el.sentenceWrap.appendChild(box);
  }

  function renderOptions(question) {
    el.opts.innerHTML = '';
    el.opts.style.gridTemplateColumns = question.choicesColumns ? `repeat(${question.choicesColumns}, 1fr)` : '';
    question.choices.forEach((choice, idx) => {
      const { main, sub } = splitOption(choice);
      const btn = document.createElement('button');
      btn.className = 'opt';
      btn.type = 'button';

      btn.innerHTML = main;
      if (sub) {
        const subEl = document.createElement('span');
        subEl.className = 'opt-sub';
        subEl.textContent = sub;
        btn.appendChild(subEl);
      }

      btn.addEventListener('click', () => handleSelect(idx));

      if (answered) {
        btn.disabled = true;
        if (idx === question.answer) btn.classList.add('correct');
        if (idx === selected && idx !== question.answer) btn.classList.add('wrong');
      }

      el.opts.appendChild(btn);
    });
  }

  function renderFeedback(question) {
    if (!answered) {
      el.fb.className = 'feedback';
      el.fb.textContent = '';
      window._aiCurrentQuestion = null;
      return;
    }

    const isCorrect = selected === question.answer;
    el.fb.className = `feedback show ${isCorrect ? 'ok' : 'ng'}`;
    const correctMsg = question.explanation || '正解です。';
    const wrongMsg = question.wrongExplanation || question.explanation || 'もう一度確認しよう。';
    el.fb.textContent = isCorrect ? `✓ 正解！${correctMsg}` : `✗ 惜しい！${wrongMsg}`;

    // 固定AIボタン用にコンテキストを保存
    window._aiCurrentQuestion = {
      question: question.question,
      selected: question.choices[selected] || '',
      correct: question.choices[question.answer] || '',
      isCorrect
    };
  }

  function renderQuestion() {
    const total = model.questions.length;
    const q = model.questions[currentQ];

    el.qLabel.textContent = `問題 ${currentQ + 1} / ${total}`;
    el.qText.textContent = q.question;
    el.qSub.textContent = q.subText || '正しいものを1つ選ぼう';

    renderSentence(q.sentence);
    renderOptions(q);
    renderFeedback(q);
    renderDots();
    renderNavProgress();

    el.btnPrev.style.visibility = currentQ === 0 ? 'hidden' : 'visible';
    el.btnNext.disabled = !answered;
    el.btnNext.textContent = currentQ === total - 1 ? '結果を見る →' : 'つぎへ →';
  }

  function showComplete() {
    const total = model.questions.length;
    const pct = total > 0 ? correctCount / total : 0;

    let icon = '📖';
    let title = 'スライドを見直そう';
    let msg = 'スライドをもう一度確認してから\n再チャレンジしよう。';

    if (pct === 1) {
      icon = '🎉';
      title = '全問正解！';
      msg = '完璧です！\n次のレッスンへ進みましょう。';
    } else if (pct >= 0.6) {
      icon = '✓';
      title = 'もう少し！';
      msg = 'スライドをもう一度確認して\n再挑戦してみよう。';
    }

    el.quiz.style.display = 'none';
    el.bottomNav.style.display = 'none';
    el.complete.classList.add('active');

    el.cIcon.textContent = icon;
    el.cTitle.textContent = title;
    el.cScore.textContent = `${correctCount} / ${total} 問正解`;
    el.cMsg.textContent = msg;

    el.navFill.style.width = '100%';
    el.navCount.textContent = '完了';
  }

  function handleSelect(index) {
    if (answered) return;
    const q = model.questions[currentQ];
    selected = index;
    answered = true;
    const isCorrect = index === q.answer;
    // まだこの問題に回答していない場合のみ正解数をカウント
    if (!questionState[currentQ]) {
      if (isCorrect) correctCount += 1;
      questionState[currentQ] = { selected: index, answered: true, correct: isCorrect };
    }
    renderQuestion();
  }

  function goPrev() {
    if (currentQ === 0) return;
    // 現在の状態を保存
    questionState[currentQ] = { selected, answered, correct: answered && selected === model.questions[currentQ].answer };
    currentQ -= 1;
    // 前の問題の状態を復元
    const prev = questionState[currentQ];
    if (prev) {
      selected = prev.selected;
      answered = prev.answered;
    } else {
      selected = null;
      answered = false;
    }
    renderQuestion();
  }

  function goNext() {
    if (!answered) return;
    if (currentQ === model.questions.length - 1) {
      showComplete();
      return;
    }
    // 現在の状態を保存
    questionState[currentQ] = { selected, answered, correct: answered && selected === model.questions[currentQ].answer };
    currentQ += 1;
    // 次の問題の状態を復元
    const next = questionState[currentQ];
    if (next) {
      selected = next.selected;
      answered = next.answered;
    } else {
      selected = null;
      answered = false;
    }
    renderQuestion();
  }

  async function init() {
    try {
      model = await loadModel();
      if (!Array.isArray(model.questions) || model.questions.length === 0) {
        throw new Error('表示できる問題がありません。');
      }

      el.lessonName.textContent = `${model.title} · 演習`;
      el.btnExit.href = `learning.html?lesson=${encodeURIComponent(sourceLessonId)}&step=1`;
      el.cBack.href = `learning.html?lesson=${encodeURIComponent(sourceLessonId)}&step=1`;

      el.btnPrev.addEventListener('click', goPrev);
      el.btnNext.addEventListener('click', goNext);

      renderQuestion();
    } catch (err) {
      el.quiz.style.display = 'none';
      el.bottomNav.style.display = 'none';
      el.error.style.display = 'block';
      el.error.textContent = err && err.message ? err.message : '演習の読み込みに失敗しました。';
    }
  }

  init();
})();

// ── AI Chat Panel ──
function openAiPanel(questionText, selectedText, correctText, wasCorrect) {
  var panel = document.getElementById('aiChatPanel');
  var overlay = document.getElementById('aiOverlay');
  var contextEl = document.getElementById('aiPanelContext');
  var messagesEl = document.getElementById('aiPanelMessages');
  contextEl.innerHTML = '<strong>問題:</strong> ' + questionText +
    '<br><strong>あなたの回答:</strong> ' + selectedText +
    '<br><strong>正解:</strong> ' + correctText +
    '<br><strong>結果:</strong> ' + (wasCorrect ? '正解' : '不正解');
  messagesEl.innerHTML = '';
  panel.classList.add('open');
  overlay.classList.add('open');
  document.body.classList.add('ai-open');
  window._aiContext = '問題: ' + questionText + ' / あなたの回答: ' + selectedText +
    ' / 正解: ' + correctText + ' / 結果: ' + (wasCorrect ? '正解' : '不正解');
  setTimeout(function() { document.getElementById('aiPanelQuestion').focus(); }, 350);
}

function closeAiPanel() {
  document.getElementById('aiChatPanel').classList.remove('open');
  document.getElementById('aiOverlay').classList.remove('open');
  document.body.classList.remove('ai-open');
}

document.getElementById('floatAiBtn').addEventListener('click', function() {
  var q = window._aiCurrentQuestion;
  if (q) {
    openAiPanel(q.question, q.selected, q.correct, q.isCorrect);
  } else {
    openAiPanel('', '', '', false);
  }
});

document.getElementById('aiPanelClose').addEventListener('click', closeAiPanel);
document.getElementById('aiOverlay').addEventListener('click', function() {
  closeAiPanel();
});

document.getElementById('aiPanelForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var input = document.getElementById('aiPanelQuestion');
  var q = input.value.trim();
  if (!q) return;

  var messagesEl = document.getElementById('aiPanelMessages');
  var sendBtn = document.getElementById('aiPanelSend');

  var userMsg = document.createElement('div');
  userMsg.className = 'ai-msg user';
  userMsg.textContent = q;
  messagesEl.appendChild(userMsg);

  input.value = '';
  sendBtn.disabled = true;

  var loadingMsg = document.createElement('div');
  loadingMsg.className = 'ai-msg assistant loading';
  loadingMsg.textContent = '回答を生成中...';
  messagesEl.appendChild(loadingMsg);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  fetch('/.netlify/functions/ai-chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question: q, context: window._aiContext || '' })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    loadingMsg.classList.remove('loading');
    loadingMsg.textContent = data.answer || '回答を取得できませんでした。';
    sendBtn.disabled = false;
    messagesEl.scrollTop = messagesEl.scrollHeight;
  })
  .catch(function() {
    loadingMsg.classList.remove('loading');
    loadingMsg.textContent = 'エラーが発生しました。もう一度お試しください。';
    sendBtn.disabled = false;
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
});
