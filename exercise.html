<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXELIA — 演習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #D32F2F;
  --blue: #1A56DB;
  --blue-dark: #1446B8;
  --blue-light: #E8F0FE;
  --green: #1B873B;
  --green-light: #E6F4EA;
  --wrong: #C62828;
  --wrong-light: #FFEBEE;
  --text: #1A1A1A;
  --sub: #888;
  --border: #E8E8E8;
  --white: #FFFFFF;
  --bg: #F9F9F9;
  --purple: #7B3FF2;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
nav {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  flex-shrink: 0;
}
.nav-logo {
  font-weight: 700;
  font-size: 20px;
  color: var(--red);
  letter-spacing: 0.08em;
  text-decoration: none;
}
.nav-center {
  flex: 1;
  max-width: 440px;
  margin: 0 40px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.lesson-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--sub);
  white-space: nowrap;
}
.nav-track {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.nav-fill {
  height: 100%;
  background: var(--blue);
  border-radius: 2px;
  transition: width 0.3s ease;
}
.nav-count {
  font-size: 12px;
  font-weight: 600;
  color: var(--sub);
  white-space: nowrap;
}
.btn-exit {
  padding: 8px 18px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: white;
  font-size: 13px;
  font-weight: 600;
  color: var(--sub);
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  text-decoration: none;
  transition: border-color 0.15s, color 0.15s;
}
.btn-exit:hover { border-color: #aaa; color: var(--text); }
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 680px;
  width: 100%;
  margin: 0 auto;
  padding: 36px 24px 28px;
}
.quiz-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px 44px;
  flex: 1;
  display: flex;
  flex-direction: column;
  animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.q-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--purple);
  margin-bottom: 24px;
}
.q-text {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.5;
  margin-bottom: 8px;
}
.q-sub {
  font-size: 14px;
  color: var(--sub);
  margin-bottom: 28px;
  line-height: 1.6;
}
.sentence-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  font-size: 18px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 28px;
  letter-spacing: 0.02em;
}
.blank {
  display: inline-block;
  width: 60px;
  border-bottom: 2.5px solid var(--text);
  margin: 0 4px;
  vertical-align: bottom;
}
.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: auto;
}
.opt {
  padding: 18px 16px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--white);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  text-align: center;
  line-height: 1.4;
  transition: border-color 0.12s, background 0.12s, transform 0.1s;
}
.opt:hover:not(:disabled) { border-color: var(--blue); background: var(--blue-light); transform: translateY(-2px); }
.opt.correct { background: var(--green-light); border-color: var(--green); color: var(--green); }
.opt.wrong { background: var(--wrong-light); border-color: var(--wrong); color: var(--wrong); text-decoration: line-through; }
.opt:disabled { cursor: default; transform: none; }
.opt-sub {
  display: block;
  font-size: 12px;
  font-weight: 400;
  margin-top: 4px;
  color: var(--sub);
}
.feedback {
  margin-top: 16px;
  padding: 14px 18px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  line-height: 1.75;
  display: none;
}
.feedback.show { display: block; }
.feedback.ok { background: var(--green-light); color: var(--green); }
.feedback.ng { background: var(--wrong-light); color: var(--wrong); }
.bottom-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 20px;
}
.btn-nav {
  padding: 12px 28px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  border: 1.5px solid var(--border);
  background: white;
  color: var(--sub);
}
.btn-nav:hover:not(:disabled) { border-color: #aaa; color: var(--text); }
.btn-nav.primary { background: var(--blue); border-color: var(--blue); color: white; }
.btn-nav.primary:hover:not(:disabled) { background: var(--blue-dark); border-color: var(--blue-dark); }
.btn-nav:disabled { opacity: 0.3; cursor: default; }
.dots { display: flex; gap: 7px; align-items: center; }
.dot { width: 7px; height: 7px; border-radius: 4px; background: var(--border); transition: width 0.2s, background 0.2s; }
.dot.done { background: rgba(26,86,219,0.3); }
.dot.active { background: var(--blue); width: 22px; }
.complete-wrap {
  flex: 1;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 0;
  animation: fadeUp 0.4s ease both;
}
.complete-wrap.active { display: flex; }
.complete-icon { font-size: 52px; margin-bottom: 20px; }
.complete-wrap h1 { font-size: 26px; font-weight: 700; margin-bottom: 12px; }
.complete-score { font-size: 34px; font-weight: 700; color: var(--blue); margin-bottom: 16px; }
.complete-wrap p { font-size: 15px; color: var(--sub); line-height: 1.85; margin-bottom: 32px; white-space: pre-line; }
.complete-btns { display: flex; gap: 12px; }
.cbtn {
  padding: 13px 28px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  text-decoration: none;
  transition: all 0.15s;
}
.cbtn.primary { background: var(--blue); color: white; border: none; }
.cbtn.primary:hover { background: var(--blue-dark); }
.cbtn.secondary { background: white; color: var(--text); border: 1.5px solid var(--border); }
.cbtn.secondary:hover { border-color: #aaa; }
.error-box {
  background: #fff4f4;
  border: 1px solid #ffcaca;
  color: #a92b2b;
  border-radius: 12px;
  padding: 16px;
  font-size: 14px;
}
@media (max-width: 600px) {
  nav { padding: 0 16px; }
  .nav-center { display: none; }
  main { padding: 24px 16px; }
  .quiz-card { padding: 28px 20px; }
  .options { grid-template-columns: 1fr; }
  .complete-btns { flex-direction: column; width: 100%; }
  .cbtn { text-align: center; }
}
</style>
</head>
<body>

<nav>
  <a href="lessons.html" class="nav-logo">NEXELIA</a>
  <div class="nav-center">
    <span class="lesson-name" id="lesson-name">演習</span>
    <div class="nav-track"><div class="nav-fill" id="nav-fill" style="width:0%"></div></div>
    <span class="nav-count" id="nav-count">1 / 1</span>
  </div>
  <a href="lessons.html" class="btn-exit" id="btn-exit">← レッスン一覧へ</a>
</nav>

<main>
  <div class="quiz-card" id="quiz">
    <div class="q-label" id="q-label">問題 1 / 1</div>
    <div class="q-text" id="q-text"></div>
    <div class="q-sub" id="q-sub"></div>
    <div id="sentence-wrap"></div>
    <div class="options" id="opts"></div>
    <div class="feedback" id="fb"></div>
  </div>

  <div class="complete-wrap" id="complete">
    <div class="complete-icon" id="c-icon"></div>
    <h1 id="c-title"></h1>
    <div class="complete-score" id="c-score"></div>
    <p id="c-msg"></p>
    <div class="complete-btns">
      <a id="c-back" href="learning.html?lesson=lesson1&step=1" class="cbtn secondary">← スライドへ</a>
      <a href="lessons.html" class="cbtn primary">次のレッスンへ →</a>
    </div>
  </div>

  <div class="bottom-nav" id="bottom-nav">
    <button class="btn-nav" id="btn-prev">← もどる</button>
    <div class="dots" id="dots"></div>
    <button class="btn-nav primary" id="btn-next" disabled>つぎへ →</button>
  </div>

  <div id="error" class="error-box" style="display:none;"></div>
</main>

<script>
(() => {
  const FALLBACK = {
    lesson1q: {
      title: 'be動詞の基本',
      questions: [
        {
          question: 'be動詞の意味は何？',
          subText: 'am・is・are に共通する、たった1つの意味を選ぼう',
          sentence: '',
          choices: ['〜する\n（動作）', '＝（イコール）\n（A は B だ）', '〜できる\n（可能）', '〜だった\n（過去）'],
          answer: 1,
          explanation: 'be動詞の意味は「＝（イコール）」のたった1つだけです。',
          wrongExplanation: 'be動詞の意味は「＝（イコール）」だけです。スライドをもう一度確認してみよう。'
        }
      ]
    },
    lesson2q: {
      title: 'be動詞の種類',
      questions: [
        { question: '主語が「I」のとき、be動詞は何？', subText: '対応表を思い出して選ぼう', choices: ['is', 'am', 'are', 'be'], answer: 1, explanation: '主語が I のとき、be動詞は am です。' },
        { question: '主語が「She」のとき、be動詞は何？', subText: '対応表を思い出して選ぼう', choices: ['am', 'are', 'is', 'be'], answer: 2, explanation: '主語が She のとき、be動詞は is です。' },
        { question: '主語が「They」のとき、be動詞は何？', subText: '対応表を思い出して選ぼう', choices: ['am', 'is', 'are', 'be'], answer: 2, explanation: '主語が They のとき、be動詞は are です。' },
        { question: '（　）に入るbe動詞はどれ？', subText: '主語を確認してから選ぼう', sentence: 'He ___ my friend.', choices: ['am', 'is', 'are', 'be'], answer: 1, explanation: '主語が He なので be動詞は is です。' },
        { question: '（　）に入るbe動詞はどれ？', subText: '主語を確認してから選ぼう', sentence: 'We ___ classmates.', choices: ['am', 'is', 'are', 'be'], answer: 2, explanation: '主語が We なので be動詞は are です。' }
      ]
    },
    lesson3q: {
      title: 'be動詞の否定文',
      questions: [
        {
          question: 'be動詞の否定文の作り方は？',
          subText: '正しいルールを選ぼう',
          choices: ['be動詞の前にnotを置く', 'be動詞の後ろにnotを置く', '文の末尾にnotを置く', 'notをbe動詞に変える'],
          answer: 1,
          explanation: 'be動詞の後ろに not を置きます。例：He is not happy.',
          wrongExplanation: 'not は be動詞の後ろに置きます（前ではありません）。例：He is not happy.'
        },
        {
          question: '次の肯定文を否定文にすると？',
          subText: '「She is busy.」→ 否定文はどれ？',
          choices: ['She not is busy.', 'She is not busy.', 'Not she is busy.', 'She is busy not.'],
          answer: 1,
          explanation: 'be動詞（is）の後ろに not を置きます。She is not busy.',
          wrongExplanation: 'not は be動詞の後ろです。She is not busy. が正解。'
        },
        {
          question: '（　）に入る語はどれ？',
          subText: '正しい語順を選ぼう',
          sentence: 'I am ___ a student.',
          choices: ['no', "don't", 'not', "is not"],
          answer: 2,
          explanation: 'be動詞（am）の後ろに not を置きます。I am not a student.',
          wrongExplanation: 'be動詞の否定は not を使います。I am not a student.'
        }
      ]
    }
,
    lesson6q: {
      title: 'be動詞の疑問文',
      questions: [
        {
          question: '正しい疑問文はどれ？',
          subText: '文を疑問文に変えよう',
          sentence: 'He is your friend.',
          choices: ['He is your friend?', 'Your friend is he?', 'Is he your friend?'],
          answer: 2,
          explanation: 'be動詞（is）を文頭に移動させます。Is he your friend?',
          wrongExplanation: 'be動詞の疑問文はbe動詞を文頭に移動させます。'
        },
        {
          question: 'Yesの答え方として正しいものは？',
          subText: '答え方の形に注目しよう',
          sentence: 'Are you a student?',
          choices: ["Yes, I'm.", 'Yes, I am.', 'Yes, am I.'],
          answer: 1,
          explanation: '正しい短い答え方は Yes, I am. です。',
          wrongExplanation: '短い答えは「主語 ＋ be動詞」の形にします。'
        },
        {
          question: '（　）に入るbe動詞はどれ？',
          subText: '主語と語順を確認しよう',
          sentence: '___ she happy?',
          choices: ['Am', 'Is', 'Are', 'Be'],
          answer: 1,
          explanation: '主語が she のとき、be動詞は is です。Is she happy?',
          wrongExplanation: 'she に対応するbe動詞は is です。'
        },
        {
          question: 'Noの答え方として正しいものは？',
          subText: '答え方の形に注目しよう',
          sentence: 'Is he your teacher?',
          choices: ['No, he not.', 'No, is he not.', 'No, he is not.'],
          answer: 2,
          explanation: '正しい短い答え方は No, he is not. です。',
          wrongExplanation: 'Noの答えは「主語 ＋ be動詞 ＋ not」の形にします。'
        },
        {
          question: '正しい疑問文はどれ？',
          subText: '文を疑問文に変えよう',
          sentence: 'They are students.',
          choices: ['They are students?', 'Are they students?', 'Is they students?'],
          answer: 1,
          explanation: 'be動詞（are）を文頭に移動させます。Are they students?',
          wrongExplanation: 'be動詞の疑問文はbe動詞を文頭に移動させます。'
        }
      ]
    }
,
    lesson5q: {
      title: 'be verb contractions',
      questions: [
        {
          question: 'Q.1 次の文を短縮形にしなさい',
          subText: 'I am happy.',
          choices: ["I'm happy.", "I amn't happy.", 'I happy.'],
          answer: 0,
          explanation: "短縮形では I am は I'm になります。",
          wrongExplanation: "I am の短縮形は I'm です。"
        },
        {
          question: 'Q.2 次の文を短縮形にしなさい',
          subText: 'I am tired.',
          choices: ["I'm tired.", "I amn't tired.", 'I tired.'],
          answer: 0,
          explanation: "短縮形では I am は I'm になります。",
          wrongExplanation: "I am の短縮形は I'm です。"
        }
      ]
    }
  };

  const params = new URLSearchParams(window.location.search);
  const requestedLessonId = params.get('lesson') || 'lesson1';

  if (requestedLessonId === 'lesson4') {
    window.location.replace('nexelia-exercise6.html');
  }

  if (requestedLessonId === 'lesson7') {
    window.location.replace('nexelia-exercise7.html');
  }

  if (requestedLessonId === 'lesson8') {
    window.location.replace('nexelia-exercise8.html');
  }

  if (requestedLessonId === 'lesson9') {
    window.location.replace('nexelia-exercise9.html');
  }

  if (requestedLessonId === 'lesson10') {
    window.location.replace('nexelia-exercise10.html');
  }

  if (requestedLessonId === 'lesson11') {
    window.location.replace('nexelia-exercise11.html');
  }

  if (requestedLessonId === 'lesson12') {
    window.location.replace('nexelia-exercise12.html');
  }

  if (requestedLessonId === 'lesson13') {
    window.location.replace('nexelia-exercise13.html');
  }

  if (requestedLessonId === 'lesson14') {
    window.location.replace('nexelia-exercise14.html');
  }

  const LESSON_EXERCISE_MAP = {
    lesson1: 'lesson1q',
    lesson2: 'lesson2q',
    lesson3: 'lesson3q',
    lesson6: 'lesson6q',
    lesson5: 'lesson5q'
  };

  const SOURCE_LESSON_MAP = {
    lesson1q: 'lesson1',
    lesson2q: 'lesson2',
    lesson3q: 'lesson3',
    lesson6q: 'lesson6',
    lesson5q: 'lesson5'
  };

  const exerciseLessonId = LESSON_EXERCISE_MAP[requestedLessonId] || requestedLessonId;
  const sourceLessonId = SOURCE_LESSON_MAP[exerciseLessonId] || requestedLessonId;

  const el = {
    lessonName: document.getElementById('lesson-name'),
    navFill: document.getElementById('nav-fill'),
    navCount: document.getElementById('nav-count'),
    btnExit: document.getElementById('btn-exit'),
    quiz: document.getElementById('quiz'),
    qLabel: document.getElementById('q-label'),
    qText: document.getElementById('q-text'),
    qSub: document.getElementById('q-sub'),
    sentenceWrap: document.getElementById('sentence-wrap'),
    opts: document.getElementById('opts'),
    fb: document.getElementById('fb'),
    btnPrev: document.getElementById('btn-prev'),
    btnNext: document.getElementById('btn-next'),
    dots: document.getElementById('dots'),
    bottomNav: document.getElementById('bottom-nav'),
    complete: document.getElementById('complete'),
    cIcon: document.getElementById('c-icon'),
    cTitle: document.getElementById('c-title'),
    cScore: document.getElementById('c-score'),
    cMsg: document.getElementById('c-msg'),
    cBack: document.getElementById('c-back'),
    error: document.getElementById('error')
  };

  let model = { title: '演習', questions: [] };
  let currentQ = 0;
  let selected = null;
  let answered = false;
  let correctCount = 0;
  // 各問題ごとの回答状態を記録（二重カウント防止）
  const questionState = {}; // { [index]: { selected, answered, correct } }

  function normalizeQuestion(raw) {
    return {
      question: String(raw.question || '問題'),
      subText: String(raw.subText || raw.hint || '正しいものを1つ選ぼう'),
      sentence: String(raw.sentence || ''),
      choices: Array.isArray(raw.choices) ? raw.choices.map((c) => String(c).replace(/\\n/g, "\n")) : [],
      answer: Number.isFinite(Number(raw.answer)) ? Number(raw.answer) : Number(raw.correctAnswer || 0),
      explanation: String(raw.explanation || ''),
      wrongExplanation: String(raw.wrongExplanation || '')
    };
  }

  async function loadModel() {
    try {
      const res = await fetch('lessons-data.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('lessons-data.json の取得に失敗しました。');
      const data = await res.json();
      const lessons = Array.isArray(data.lessons) ? data.lessons : [];
      const lesson = lessons.find((l) => l.id === exerciseLessonId) || lessons.find((l) => l.id === requestedLessonId);

      if (!lesson) {
        if (FALLBACK[exerciseLessonId]) return FALLBACK[exerciseLessonId];
        throw new Error('演習データが見つかりません。');
      }

      const steps = Array.isArray(lesson.steps) ? lesson.steps : [];
      const questionSteps = steps.filter((s) => {
        const t = String(s.type || '').toLowerCase();
        return t === 'question' || t === 'exercise';
      }).map(normalizeQuestion).filter((q) => q.choices.length > 0);

      if (questionSteps.length > 0) {
        return { title: lesson.title || '演習', questions: questionSteps };
      }

      if (FALLBACK[exerciseLessonId]) return FALLBACK[exerciseLessonId];
      throw new Error('このレッスンには演習問題がありません。');
    } catch (err) {
      if (FALLBACK[exerciseLessonId]) return FALLBACK[exerciseLessonId];
      throw err;
    }
  }

  function splitOption(text) {
    const parts = String(text).split('\n');
    return { main: parts[0] || '', sub: parts.slice(1).join('\n') };
  }

  function renderDots() {
    const total = model.questions.length;
    el.dots.innerHTML = '';
    for (let i = 0; i < total; i += 1) {
      const d = document.createElement('div');
      d.className = 'dot' + (i < currentQ ? ' done' : i === currentQ ? ' active' : '');
      el.dots.appendChild(d);
    }
  }

  function renderNavProgress() {
    const total = model.questions.length;
    const progress = ((currentQ + (answered ? 1 : 0)) / total) * 100;
    el.navFill.style.width = `${Math.max(0, Math.min(100, progress))}%`;
    el.navCount.textContent = `${currentQ + 1} / ${total}`;
  }

  function renderSentence(sentence) {
    el.sentenceWrap.innerHTML = '';
    if (!sentence) return;

    const box = document.createElement('div');
    box.className = 'sentence-box';

    if (sentence.includes('___')) {
      const parts = sentence.split('___');
      const blank = '<span class="blank"></span>';
      box.innerHTML = `${parts[0]}${blank}${parts[1] || ''}`;
    } else {
      box.textContent = sentence;
    }

    el.sentenceWrap.appendChild(box);
  }

  function renderOptions(question) {
    el.opts.innerHTML = '';
    question.choices.forEach((choice, idx) => {
      const { main, sub } = splitOption(choice);
      const btn = document.createElement('button');
      btn.className = 'opt';
      btn.type = 'button';

      btn.innerHTML = main;
      if (sub) {
        const subEl = document.createElement('span');
        subEl.className = 'opt-sub';
        subEl.textContent = sub;
        btn.appendChild(subEl);
      }

      btn.addEventListener('click', () => handleSelect(idx));

      if (answered) {
        btn.disabled = true;
        if (idx === question.answer) btn.classList.add('correct');
        if (idx === selected && idx !== question.answer) btn.classList.add('wrong');
      }

      el.opts.appendChild(btn);
    });
  }

  function renderFeedback(question) {
    if (!answered) {
      el.fb.className = 'feedback';
      el.fb.textContent = '';
      return;
    }

    const isCorrect = selected === question.answer;
    el.fb.className = `feedback show ${isCorrect ? 'ok' : 'ng'}`;
    const correctMsg = question.explanation || '正解です。';
    const wrongMsg = question.wrongExplanation || question.explanation || 'もう一度確認しよう。';
    el.fb.textContent = isCorrect ? `✓ 正解！${correctMsg}` : `✗ 惜しい！${wrongMsg}`;
  }

  function renderQuestion() {
    const total = model.questions.length;
    const q = model.questions[currentQ];

    el.qLabel.textContent = `問題 ${currentQ + 1} / ${total}`;
    el.qText.textContent = q.question;
    el.qSub.textContent = q.subText || '正しいものを1つ選ぼう';

    renderSentence(q.sentence);
    renderOptions(q);
    renderFeedback(q);
    renderDots();
    renderNavProgress();

    el.btnPrev.style.visibility = currentQ === 0 ? 'hidden' : 'visible';
    el.btnNext.disabled = !answered;
    el.btnNext.textContent = currentQ === total - 1 ? '結果を見る →' : 'つぎへ →';
  }

  function showComplete() {
    const total = model.questions.length;
    const pct = total > 0 ? correctCount / total : 0;

    let icon = '📖';
    let title = 'スライドを見直そう';
    let msg = 'スライドをもう一度確認してから\n再チャレンジしよう。';

    if (pct === 1) {
      icon = '🎉';
      title = '全問正解！';
      msg = '完璧です！\n次のレッスンへ進みましょう。';
    } else if (pct >= 0.6) {
      icon = '✓';
      title = 'もう少し！';
      msg = 'スライドをもう一度確認して\n再挑戦してみよう。';
    }

    el.quiz.style.display = 'none';
    el.bottomNav.style.display = 'none';
    el.complete.classList.add('active');

    el.cIcon.textContent = icon;
    el.cTitle.textContent = title;
    el.cScore.textContent = `${correctCount} / ${total} 問正解`;
    el.cMsg.textContent = msg;

    el.navFill.style.width = '100%';
    el.navCount.textContent = '完了';
  }

  function handleSelect(index) {
    if (answered) return;
    const q = model.questions[currentQ];
    selected = index;
    answered = true;
    const isCorrect = index === q.answer;
    // まだこの問題に回答していない場合のみ正解数をカウント
    if (!questionState[currentQ]) {
      if (isCorrect) correctCount += 1;
      questionState[currentQ] = { selected: index, answered: true, correct: isCorrect };
    }
    renderQuestion();
  }

  function goPrev() {
    if (currentQ === 0) return;
    // 現在の状態を保存
    questionState[currentQ] = { selected, answered, correct: answered && selected === model.questions[currentQ].answer };
    currentQ -= 1;
    // 前の問題の状態を復元
    const prev = questionState[currentQ];
    if (prev) {
      selected = prev.selected;
      answered = prev.answered;
    } else {
      selected = null;
      answered = false;
    }
    renderQuestion();
  }

  function goNext() {
    if (!answered) return;
    if (currentQ === model.questions.length - 1) {
      showComplete();
      return;
    }
    // 現在の状態を保存
    questionState[currentQ] = { selected, answered, correct: answered && selected === model.questions[currentQ].answer };
    currentQ += 1;
    // 次の問題の状態を復元
    const next = questionState[currentQ];
    if (next) {
      selected = next.selected;
      answered = next.answered;
    } else {
      selected = null;
      answered = false;
    }
    renderQuestion();
  }

  async function init() {
    try {
      model = await loadModel();
      if (!Array.isArray(model.questions) || model.questions.length === 0) {
        throw new Error('表示できる問題がありません。');
      }

      el.lessonName.textContent = `${model.title} · 演習`;
      el.btnExit.href = `learning.html?lesson=${encodeURIComponent(sourceLessonId)}&step=1`;
      el.cBack.href = `learning.html?lesson=${encodeURIComponent(sourceLessonId)}&step=1`;

      el.btnPrev.addEventListener('click', goPrev);
      el.btnNext.addEventListener('click', goNext);

      renderQuestion();
    } catch (err) {
      el.quiz.style.display = 'none';
      el.bottomNav.style.display = 'none';
      el.error.style.display = 'block';
      el.error.textContent = err && err.message ? err.message : '演習の読み込みに失敗しました。';
    }
  }

  init();
})();
</script>
<script src="beta-badge.js"></script>
</body>
</html>
