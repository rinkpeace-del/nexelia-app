<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXELIA | Why / How 演習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red:#D32F2F; --blue:#1A56DB; --blue-dark:#1446B8; --blue-light:#E8F0FE;
  --green:#1B873B; --green-light:#E6F4EA; --wrong:#C62828; --wrong-light:#FFEBEE;
  --text:#1A1A1A; --sub:#888; --border:#E8E8E8; --white:#FFF; --bg:#F9F9F9; --purple:#7C3AED;
}
body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }
nav { background:var(--white); border-bottom:1px solid var(--border); height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 32px; }
.nav-logo { font-weight:700; font-size:20px; color:var(--red); letter-spacing:.08em; text-decoration:none; }
.nav-center { flex:1; max-width:400px; margin:0 40px; display:flex; align-items:center; gap:12px; }
.lesson-name { font-size:13px; font-weight:600; color:var(--sub); white-space:nowrap; }
.nav-track { flex:1; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.nav-fill { height:100%; background:var(--blue); border-radius:2px; transition:width .5s ease; }
.nav-count { font-size:12px; font-weight:600; color:var(--sub); white-space:nowrap; }
.btn-exit { padding:8px 18px; border-radius:8px; border:1.5px solid var(--border); background:white; font-size:13px; font-weight:600; color:var(--sub); text-decoration:none; }
main { flex:1; display:flex; flex-direction:column; max-width:680px; width:100%; margin:0 auto; padding:36px 24px 28px; }
.slide { display:none; flex-direction:column; flex:1; }
.slide.active { display:flex; }
.quiz-card { background:#fff; border:1px solid var(--border); border-radius:20px; padding:40px 44px; flex:1; display:flex; flex-direction:column; gap:24px; }
.q-label { font-size:11px; font-weight:700; letter-spacing:.12em; color:var(--purple); }
.q-text  { font-size:20px; font-weight:700; line-height:1.5; }
.q-sub   { font-size:14px; color:var(--sub); line-height:1.6; }
.q-sentence { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:16px 20px; font-size:18px; font-weight:700; text-align:center; }
.q-sentence .blank { display:inline-block; width:90px; border-bottom:2.5px solid var(--text); margin:0 4px; vertical-align:bottom; }
.options { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:auto; }
.options.single { grid-template-columns:1fr; }
.opt { padding:16px; border-radius:12px; border:1.5px solid var(--border); background:#fff; font-size:15px; font-weight:700; color:var(--text); cursor:pointer; text-align:center; line-height:1.5; transition:border-color .12s, background .12s, transform .1s; }
.opt:hover:not(:disabled) { border-color:var(--blue); background:var(--blue-light); transform:translateY(-2px); }
.opt.correct { background:var(--green-light); border-color:var(--green); color:var(--green); }
.opt.wrong { background:var(--wrong-light); border-color:var(--wrong); color:var(--wrong); text-decoration:line-through; }
.opt:disabled { cursor:default; transform:none; }
.feedback { padding:14px 18px; border-radius:10px; font-size:14px; font-weight:600; display:none; line-height:1.75; }
.feedback.show { display:block; }
.feedback.ok { background:var(--green-light); color:var(--green); }
.feedback.ng { background:var(--wrong-light); color:var(--wrong); }
.bottom-nav { display:flex; justify-content:space-between; align-items:center; margin-top:20px; }
.btn-nav { padding:12px 28px; border-radius:10px; font-size:14px; font-weight:700; border:1.5px solid var(--border); background:white; color:var(--sub); cursor:pointer; }
.btn-nav.primary { background:var(--blue); border-color:var(--blue); color:white; }
.btn-nav:disabled { opacity:.3; cursor:default; }
.dots { display:flex; gap:7px; align-items:center; }
.dot { width:7px; height:7px; border-radius:4px; background:var(--border); transition:width .2s, background .2s; }
.dot.done { background:rgba(26,86,219,.3); }
.dot.active { background:var(--blue); width:22px; }
.complete-wrap { flex:1; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 0; }
.complete-wrap.active { display:flex; }
.complete-icon { font-size:52px; margin-bottom:20px; }
.complete-wrap h1 { font-size:26px; font-weight:700; margin-bottom:12px; }
.score-badge { font-size:34px; font-weight:700; color:var(--blue); margin-bottom:16px; }
.complete-wrap p { font-size:15px; color:var(--sub); line-height:1.85; margin-bottom:32px; }
.complete-btns { display:flex; gap:12px; }
.cbtn { padding:13px 28px; border-radius:10px; font-size:14px; font-weight:700; text-decoration:none; }
.cbtn.primary { background:var(--blue); color:white; }
.cbtn.secondary { background:white; color:var(--text); border:1.5px solid var(--border); }
@media (max-width: 600px) { nav { padding:0 16px; } .nav-center { display:none; } main { padding:20px 16px; } .quiz-card { padding:24px 18px; } }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">NEXELIA</a>
  <div class="nav-center">
    <span class="lesson-name">Why / How ・ 演習</span>
    <div class="nav-track"><div class="nav-fill" id="nav-fill" style="width:33%"></div></div>
    <span class="nav-count" id="nav-count">1 / 3</span>
  </div>
  <a href="nexelia-study26.html" class="btn-exit">← スライドへ</a>
</nav>
<main>
  <div class="slide active" id="s0">
    <div class="quiz-card">
      <div class="q-label">問題 1 / 3</div>
      <div class="q-text">空欄に入る正しい語を選ぼう</div>
      <div class="q-sub">「なぜ英語を勉強するのですか？」はどれ？</div>
      <div class="q-sentence"><span class="blank"></span> do you study English?</div>
      <div class="options" id="o0">
        <button class="opt" data-correct="true">Why</button>
        <button class="opt" data-correct="false">How</button>
        <button class="opt" data-correct="false">Where</button>
        <button class="opt" data-correct="false">When</button>
      </div>
      <div class="feedback" id="f0"></div>
    </div>
    <div class="bottom-nav">
      <button class="btn-nav" style="visibility:hidden">前へ</button>
      <div class="dots" id="d0"></div>
      <button class="btn-nav primary" id="n0" disabled>次へ →</button>
    </div>
  </div>

  <div class="slide" id="s1">
    <div class="quiz-card">
      <div class="q-label">問題 2 / 3</div>
      <div class="q-text">空欄に入る正しい語を選ぼう</div>
      <div class="q-sub">「どのように学校へ行きますか？」はどれ？</div>
      <div class="q-sentence"><span class="blank"></span> do you go to school?</div>
      <div class="options" id="o1">
        <button class="opt" data-correct="false">Why</button>
        <button class="opt" data-correct="true">How</button>
        <button class="opt" data-correct="false">Who</button>
        <button class="opt" data-correct="false">What</button>
      </div>
      <div class="feedback" id="f1"></div>
    </div>
    <div class="bottom-nav">
      <button class="btn-nav" id="back1">← もどる</button>
      <div class="dots" id="d1"></div>
      <button class="btn-nav primary" id="n1" disabled>次へ →</button>
    </div>
  </div>

  <div class="slide" id="s2">
    <div class="quiz-card">
      <div class="q-label">問題 3 / 3</div>
      <div class="q-text">Why の答え方として正しいものを選ぼう</div>
      <div class="q-sub">Why do you like English?</div>
      <div class="options single" id="o2">
        <button class="opt" data-correct="false">Yes, I do.</button>
        <button class="opt" data-correct="true">Because it is fun.</button>
        <button class="opt" data-correct="false">I like English.</button>
      </div>
      <div class="feedback" id="f2"></div>
    </div>
    <div class="bottom-nav">
      <button class="btn-nav" id="back2">← もどる</button>
      <div class="dots" id="d2"></div>
      <button class="btn-nav primary" id="n2" disabled>結果を見る →</button>
    </div>
  </div>

  <div class="complete-wrap" id="complete">
    <div class="complete-icon" id="c-icon"></div>
    <h1 id="c-title"></h1>
    <div class="score-badge" id="c-score"></div>
    <p id="c-msg"></p>
    <div class="complete-btns">
      <a href="nexelia-study26.html" class="cbtn secondary">← スライドへ</a>
      <a href="lessons.html" class="cbtn primary">レッスン一覧へ →</a>
    </div>
  </div>
</main>

<script>
  const TOTAL = 3;
  let cur = 0;
  let correct = 0;
  const answered = {};
  const LESSON_ID = 'lesson26';
  const PROGRESS_KEY = 'nexeliaLessonProgress';

  function saveLessonProgress(value) {
    try {
      const raw = localStorage.getItem(PROGRESS_KEY) || '{}';
      const progressMap = JSON.parse(raw);
      progressMap[LESSON_ID] = Math.max(Number(progressMap[LESSON_ID]) || 0, value);
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(progressMap));
      localStorage.setItem('nexeliaLastLesson', LESSON_ID);
    } catch (_) {}
  }

  const FB = [
    { ok: '正解！「なぜ〜？」は Why を使います。', ng: '不正解。「なぜ〜？」は Why を使います。' },
    { ok: '正解！「どのように〜？」は How を使います。', ng: '不正解。「どのように〜？」は How を使います。' },
    { ok: '正解！Why の答えは Because ... が基本です。', ng: '不正解。Why の答えは Because ... で始めます。' }
  ];

  function renderDots(id) {
    const el = document.getElementById('d' + id);
    if (!el) return;
    el.innerHTML = '';
    for (let i = 0; i < TOTAL; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i < id ? ' done' : i === id ? ' active' : '');
      el.appendChild(d);
    }
  }

  function go(idx) {
    const current = document.getElementById('s' + cur);
    const next = document.getElementById('s' + idx);
    if (!current || !next) return;
    current.classList.remove('active');
    cur = idx;
    next.classList.add('active');
    const fill = document.getElementById('nav-fill');
    const count = document.getElementById('nav-count');
    if (fill) fill.style.width = ((cur + 1) / TOTAL * 100) + '%';
    if (count) count.textContent = (cur + 1) + ' / ' + TOTAL;
    renderDots(cur);
  }

  function finish() {
    saveLessonProgress(100);
    document.getElementById('s2')?.classList.remove('active');
    document.getElementById('complete')?.classList.add('active');
    const fill = document.getElementById('nav-fill');
    const count = document.getElementById('nav-count');
    if (fill) fill.style.width = '100%';
    if (count) count.textContent = '完了';

    document.getElementById('c-score').textContent = `${correct} / ${TOTAL} 正解`;
    const icon = document.getElementById('c-icon');
    const title = document.getElementById('c-title');
    const msg = document.getElementById('c-msg');

    if (correct === 3) {
      icon.textContent = '🎉';
      title.textContent = '全問正解！';
      msg.innerHTML = 'Why / How の使い分けはばっちりです。<br>次の学習に進みましょう。';
    } else if (correct === 2) {
      icon.textContent = '👍';
      title.textContent = 'あと一歩！';
      msg.innerHTML = '惜しいミスがありました。<br>もう一度チャレンジしてみよう。';
    } else {
      icon.textContent = '📘';
      title.textContent = '復習しよう';
      msg.innerHTML = 'スライドを見直してから再挑戦すると効果的です。';
    }
  }

  for (let q = 0; q < TOTAL; q++) {
    ((qIdx) => {
      const opts = document.querySelectorAll(`#o${qIdx} .opt`);
      opts.forEach((btn) => {
        btn.addEventListener('click', () => {
          if (answered[qIdx]) return;
          answered[qIdx] = true;
          const isCorrect = btn.dataset.correct === 'true';
          if (isCorrect) correct += 1;

          opts.forEach((b) => {
            b.disabled = true;
            if (b.dataset.correct === 'true') b.classList.add('correct');
          });
          if (!isCorrect) btn.classList.add('wrong');

          const fb = document.getElementById(`f${qIdx}`);
          fb.classList.add('show', isCorrect ? 'ok' : 'ng');
          fb.textContent = isCorrect ? FB[qIdx].ok : FB[qIdx].ng;

          document.getElementById(`n${qIdx}`).disabled = false;
        });
      });
    })(q);
  }

  document.getElementById('n0')?.addEventListener('click', () => go(1));
  document.getElementById('n1')?.addEventListener('click', () => go(2));
  document.getElementById('n2')?.addEventListener('click', finish);
  document.getElementById('back1')?.addEventListener('click', () => go(0));
  document.getElementById('back2')?.addEventListener('click', () => go(1));

  saveLessonProgress(60);
  renderDots(0);
</script>
</body>
</html>
