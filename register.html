<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユーザー登録 | NEXELIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      -webkit-font-smoothing: antialiased;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .register-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 420px;
      padding: 50px 40px;
    }

    .register-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      font-size: 32px;
      font-weight: 800;
      color: #D32F2F;
      letter-spacing: 0.03em;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #888;
      font-size: 14px;
      font-weight: 400;
      margin-bottom: 4px;
    }

    .subtext {
      color: #AAA;
      font-size: 12px;
      font-weight: 400;
    }

    .form-group {
      margin-bottom: 28px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      color: #1A1A1A;
      font-size: 15px;
      font-weight: 600;
    }

    .form-input {
      width: 100%;
      padding: 15px 18px;
      border: 1px solid #E8E8E8;
      border-radius: 8px;
      font-size: 15px;
      font-family: 'Noto Sans JP', sans-serif;
      transition: border-color 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-input::placeholder {
      color: #AAA;
    }

    .password-requirements {
      font-size: 12px;
      color: #888;
      margin-top: 6px;
      line-height: 1.6;
    }

    .register-button {
      width: 100%;
      padding: 16px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .register-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .register-button:active {
      transform: translateY(0);
    }

    .register-button:disabled {
      background: #CCC;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      color: #D32F2F;
      font-size: 14px;
      margin-top: 8px;
      display: none;
      padding: 10px;
      background: #FFEBEE;
      border-radius: 4px;
      border-left: 4px solid #D32F2F;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      color: #1B873B;
      font-size: 14px;
      margin-bottom: 16px;
      padding: 10px;
      background: #E6F4EA;
      border-radius: 4px;
      border-left: 4px solid #1B873B;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .login-link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #888;
    }

    .login-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="register-header">
      <div class="logo">NEXELIA</div>
      <div class="subtitle">ユーザー登録</div>
      <div class="subtext">新しいアカウントを作成</div>
    </div>

    <div class="success-message" id="successMessage">
      登録に成功しました！ログインページにリダイレクトします...
    </div>

    <form id="registerForm">
      <div class="form-group">
        <label class="form-label" for="username">ユーザー名</label>
        <input
          type="text"
          id="username"
          class="form-input"
          placeholder="3文字以上のユーザー名"
          autocomplete="username"
          required
        >
        <div class="password-requirements">• 3文字以上</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">パスワード</label>
        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="6文字以上のパスワード"
          autocomplete="new-password"
          required
        >
        <div class="password-requirements">• 6文字以上</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">パスワード（確認）</label>
        <input
          type="password"
          id="confirmPassword"
          class="form-input"
          placeholder="パスワードを再度入力"
          autocomplete="new-password"
          required
        >
        <div class="error-message" id="errorMessage"></div>
      </div>

      <button type="submit" class="register-button" id="registerButton">アカウント作成</button>
    </form>

    <div class="login-link">
      すでにアカウントをお持ちですか？ <a href="login.html">ログイン</a>
    </div>
  </div>

  <script>
    /* ユーザー登録フォーム送信処理 */
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMessage = document.getElementById('errorMessage');
      const successMessage = document.getElementById('successMessage');
      const registerButton = document.getElementById('registerButton');

      /* メッセージをクリア */
      errorMessage.classList.remove('show');
      errorMessage.textContent = '';
      successMessage.classList.remove('show');
      registerButton.disabled = true;
      registerButton.textContent = '処理中...';

      try {
        /* 認証サーバーのAPIエンドポイントに送信 */
        const apiUrl = 'http://localhost:5001/api/auth/register';

        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({username, password, confirmPassword})
        });
        const data = await response.json();

        /* 登録失敗時の処理 */
        if (!response.ok) {
          errorMessage.textContent = data.error || '登録に失敗しました';
          errorMessage.classList.add('show');
          registerButton.disabled = false;
          registerButton.textContent = 'アカウント作成';
          return;
        }

        /* 登録成功：成功メッセージを表示してログインページへリダイレクト */
        successMessage.classList.add('show');
        document.getElementById('registerForm').style.opacity = '0.5';
        document.getElementById('registerForm').style.pointerEvents = 'none';
        setTimeout(() => {window.location.href = 'login.html';}, 2000);
      } catch (error) {
        console.error('登録エラー:', error);
        errorMessage.textContent = 'ネットワークエラーが発生しました';
        errorMessage.classList.add('show');
        registerButton.disabled = false;
        registerButton.textContent = 'アカウント作成';
      }
    });

    /* ページロード時にログイン状態を確認 */
    window.addEventListener('load', function() {
      if (localStorage.getItem('nexeliaLoggedIn') === 'true') {
        window.location.href = 'lessons.html';
      }
    });
  </script>
</body>
</html>
