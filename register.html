<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NEXELIA 無料登録" />
  <title>無料登録 | NEXELIA</title>
  <link rel="stylesheet" href="stylesheet.css" />
  <style>
    .form-wrap {
      max-width: 560px;
      margin: 48px auto 80px;
    }
    .form-wrap h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      margin: 0 0 8px;
    }
    .form-wrap p {
      color: var(--muted);
      margin: 0 0 18px;
    }
    .back-link {
      display: inline-block;
      margin-top: 14px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="logo">NEXELIA</a>
    </div>
  </header>
  <main class="container">
    <section class="form-wrap page-card">
      <h1>無料登録</h1>
      <p>中高生向け英語学習を、短いインプットと演習で始めましょう。</p>
      <form action="thanks.html" method="get">
        <div class="field">
          <label for="name">氏名</label>
          <input id="name" name="name" type="text" autocomplete="name" required />
        </div>
        <div class="field">
          <label for="email">メールアドレス</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="grade">学年</label>
          <select id="grade" name="grade" required>
            <option value="">選択してください</option>
            <option>中学1年</option>
            <option>中学2年</option>
            <option>中学3年</option>
            <option>高校1年</option>
            <option>高校2年</option>
            <option>高校3年</option>
          </select>
        </div>
        <button class="btn-primary" type="submit">登録を完了する</button>
      </form>
      <a class="back-link" href="index.html">← トップに戻る</a>
    </section>
  </main>
  <script src="ai-chat.js"></script>
</body>
</html>
