<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NEXELIA レッスン一覧" />
  <title>レッスン一覧 | NEXELIA</title>
  <link rel="stylesheet" href="stylesheet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand: #1A56DB;
      --brand-dark: #1446B8;
      --line: #E8E8E8;
      --ink: #1A1A1A;
      --ink-2: #555555;
      --ink-3: #888888;
      --ink-4: #AAAAAA;
    }

    * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }

    body {
      margin: 0;
      background: #ffffff;
      color: var(--ink);
      font-family: 'Noto Sans JP', sans-serif;
    }

    .site-header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 100;
      height: 64px;
      display: flex;
      align-items: center;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 0 32px;
    }

    .logo {
      text-decoration: none;
      color: #D32F2F;
      font-weight: 800;
      font-size: 1.7rem;
      letter-spacing: 0.03em;
      display: inline-block;
      line-height: 1;
    }

    .lessons-page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 56px 40px;
    }

    .hero {
      margin-bottom: 36px;
    }

    .hero h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      color: var(--ink);
    }

    .hero-beta-note {
      margin: 10px 0 0;
      color: var(--ink-4);
      font-size: 13px;
      line-height: 1.7;
      font-weight: 400;
    }

    .overall {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px 32px;
      margin-bottom: 56px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }

    .overall-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .overall-label {
      color: var(--ink-2);
      font-weight: 500;
      font-size: 14px;
      white-space: nowrap;
    }

    .progress-rail {
      flex: 1;
      height: 8px;
      border-radius: 999px;
      background: #F0F0F0;
      overflow: hidden;
      min-width: 80px;
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--brand);
      width: 0;
      transition: width .4s cubic-bezier(.4,0,.2,1);
    }

    .overall-percent {
      color: var(--brand);
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
    }

    .overall-text {
      color: var(--ink-3);
      font-size: 13px;
      margin-top: 12px;
    }

    .units-list {
      display: flex;
      flex-direction: column;
      gap: 56px;
    }

    .unit-head {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .unit-label {
      color: #999;
      font-size: 11px;
      letter-spacing: .1em;
      font-weight: 700;
      text-transform: uppercase;
    }

    .unit-title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
    }

    .unit-mini {
      max-width: 140px;
      flex: 1;
      height: 4px;
      border-radius: 999px;
      background: var(--line);
      overflow: hidden;
    }

    .unit-mini .progress-fill {
      height: 100%;
    }

    .unit-count {
      color: var(--ink-3);
      font-size: 13px;
    }

    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .lesson-card {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: box-shadow .2s, transform .2s;
    }

    .lesson-card.is-clickable {
      cursor: pointer;
    }

    .lesson-card.is-clickable:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .lesson-card.is-clickable:focus-visible {
      outline: 2px solid var(--brand);
      outline-offset: 2px;
    }

    .icon-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background: #F5F5F5;
      color: #9CA3AF;
    }

    .icon-dot.complete {
      background: #E8F0FE;
      border-color: #D1DDF8;
      color: var(--brand);
    }

    .icon-dot .dot-inner {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #CCCCCC;
    }

    .icon-dot svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-title {
      margin: 8px 0 2px;
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.5;
      min-height: 48px;
    }

    .card-foot {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-bar {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: #EFEFEF;
      overflow: hidden;
    }

    .card-bar-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--brand);
    }

    .card-status {
      font-size: 12px;
      font-weight: 700;
      min-width: 40px;
      text-align: right;
    }

    .card-status.complete {
      color: var(--brand);
    }

    .card-status.inprogress {
      color: #F59E0B;
    }

    .card-status.none {
      color: #A3A3A3;
    }

    @media (max-width: 980px) {
      .lessons-page { padding: 40px 20px; }
      .lesson-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .site-header { height: 58px; }
      .topbar { padding: 0 14px; }
      .logo { font-size: 1.35rem; }
      .lessons-page { padding: 28px 14px; }
      .hero h1 { font-size: 24px; }
      .overall { padding: 18px 16px; margin-bottom: 36px; }
      .overall-row { gap: 10px; }
      .overall-label, .overall-percent { font-size: 12px; }
      .units-list { gap: 36px; }
      .unit-head { margin-bottom: 16px; }
      .lesson-grid { grid-template-columns: 1fr; gap: 12px; }
      .card-title { font-size: 16px; min-height: 0; }
    }
  </style>
</head>

    const clamp = (v) => Math.max(0, Math.min(100, Number(v) || 0));
    const lessonsFlat = units.flatMap((unit) => unit.lessons.map((lesson) => ({ unit, lesson })));

    const unitsContainer = document.getElementById("unitsContainer");
    const CHECK_SVG = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><polyline points="20 6 9 17 4 12"/></svg>`;

    function createLessonCard(lesson) {
      const progress = clamp(progressMap[lesson.id]);
      const isComplete = progress >= 100;
      const isInProgress = progress > 0 && progress < 100;

      const card = document.createElement("article");
      card.className = "lesson-card";

      const iconClass = isComplete ? "complete" : "default";
      const iconContent = isComplete ? CHECK_SVG : `<span class="dot-inner"></span>`;

      const statusClass = isComplete ? "complete" : isInProgress ? "inprogress" : "none";
      const statusLabel = isComplete ? "完了" : isInProgress ? "学習中" : "未学習";
      const barWidth = String(isComplete ? 100 : isInProgress ? progress : 0);

      card.innerHTML = `
        <div class="icon-dot ${iconClass}" aria-hidden="true">${iconContent}</div>
        <p class="card-title">${lesson.title}</p>
        <div class="card-foot">
          <div class="card-bar"><div class="card-bar-fill" style="width:${barWidth}%"></div></div>
          <span class="card-status ${statusClass}">${statusLabel}</span>
        </div>
      `;

      card.classList.add("is-clickable");
      card.setAttribute("role", "link");
      card.tabIndex = 0;
      card.setAttribute("aria-label", `${lesson.title} を開く`);

      const goToLesson = () => {
        if (!lesson.href || lesson.href === "#") return;
        try {
          localStorage.setItem("nexeliaLastLesson", lesson.id);
        } catch (_) {}
        window.location.href = lesson.href;
      };

      card.addEventListener("click", goToLesson);
      card.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          goToLesson();
        }
      });

      return { card, isComplete };
    }

    let totalLessons = 0;
    let completedLessons = 0;

    units.forEach((unit) => {
      const section = document.createElement("section");
      const grid = document.createElement("div");
      grid.className = "lesson-grid";

      let unitComplete = 0;
      const unitTotal = unit.lessons.length;

      unit.lessons.forEach((lesson) => {
        const { card, isComplete } = createLessonCard(lesson);
        grid.appendChild(card);
        totalLessons += 1;
        if (isComplete) {
          completedLessons += 1;
          unitComplete += 1;
        }
      });

      const unitPercent = unitTotal ? Math.round((unitComplete / unitTotal) * 100) : 0;
      const head = document.createElement("header");
      head.className = "unit-head";
      head.innerHTML = `
        <span class="unit-label">${unit.label}</span>
        <h2 class="unit-title">${unit.title}</h2>
        <div class="unit-mini" aria-hidden="true"><div class="progress-fill" style="width:${unitPercent}%"></div></div>
        <span class="unit-count">${unitComplete} / ${unitTotal}</span>
      `;

      section.append(head, grid);
      unitsContainer.appendChild(section);
    });

    const overallPercent = totalLessons ? Math.round((completedLessons / totalLessons) * 100) : 0;
    document.getElementById("overallFill").style.width = `${overallPercent}%`;
    document.getElementById("overallPercent").textContent = `${overallPercent}%`;
    document.getElementById("overallText").textContent = `${completedLessons} / ${totalLessons} レッスン完了`;
