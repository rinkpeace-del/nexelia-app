<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NEXELIA スライド学習" />
  <title>レッスン | NEXELIA</title>
  <link rel="stylesheet" href="stylesheet.css" />
  <style>
    .learning {
      padding: 16px 0;
    }

    .slide-shell {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .slide-head {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .ghost {
      border: 0;
      background: transparent;
      color: var(--ink);
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .slide-frame {
      border: 0;
      border-radius: 12px;
      overflow: hidden;
      background: transparent;
      width: 80%;
      margin: 0 auto;
      height: calc(75vh - 80px);
      min-height: 320px;
    }

    .slide-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: transparent;
    }

    .slide-frame:fullscreen {
      width: 100vw;
      height: 100vh;
      border: 0;
      border-radius: 0;
      margin: 0;
    }

    .slide-help {
      margin: 0;
      color: var(--muted);
      font-size: 0.85rem;
    }

    @media (max-width: 760px) {
      .slide-frame {
        width: 100%;
        height: calc(100vh - 220px);
        min-height: 320px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="logo">NEXELIA</a>
      <a href="lessons.html" class="ghost">レッスン一覧へ</a>
    </div>
  </header>

  <main class="container learning">
    <section class="slide-shell">
      <div class="slide-head">
        <button class="ghost" id="fullscreenBtn" type="button">「」</button>
      </div>

      <div class="slide-frame" id="slideFrameWrap">
        <iframe id="slideFrame" title="学習スライド" loading="lazy" allowfullscreen></iframe>
      </div>
      <p class="slide-help">スライドURLは `english-j1-grammar.js` の `EMBED_URL` を変更してください。</p>
    </section>
  </main>

  <script src="english-j1-grammar.js"></script>
  <script src="ai-chat.js"></script>
</body>
</html>
