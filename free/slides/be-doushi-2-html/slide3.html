<!doctype html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
* { -webkit-font-smoothing: antialiased; }
:root {
  --blue: #1A56DB;
  --blue-light: #E8F0FE;
  --orange: #E65100;
  --sub: #888;
  --border: #E8E8E8;
  --text: #1A1A1A;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #fff;
  color: var(--text);
  padding: 40px 48px 56px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  overflow: auto;
  scrollbar-width: none;
}
body::-webkit-scrollbar { display: none; }
.slide-label { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; color: var(--blue); }
.concept-title { font-size: 13px; font-weight: 600; color: var(--sub); margin-bottom: 8px; }
.concept-text { font-size: 26px; font-weight: 700; line-height: 1.4; }
.summary-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.summary-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  border: 1px solid var(--border);
  border-radius: 12px;
}
.summary-num {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--blue);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}
.summary-text {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.6;
}
.point-box {
  margin-top: auto;
  background: var(--blue-light);
  border-radius: 12px;
  padding: 18px 22px;
  font-size: 15px;
  color: var(--blue);
  font-weight: 600;
  line-height: 1.7;
}
</style>
</head>
<body>
<div class="slide-label">be動詞の否定文 · まとめ</div>

<div>
  <div class="concept-title">このレッスンで学んだこと</div>
  <div class="concept-text">まとめ</div>
</div>

<div class="summary-list">
  <div class="summary-item">
    <div class="summary-num">1</div>
    <div class="summary-text">否定文は be動詞の<strong style="color: var(--blue);">後ろ</strong>に <strong style="color: var(--orange);">not</strong> を置く（前には置かない）</div>
  </div>
  <div class="summary-item">
    <div class="summary-num">2</div>
    <div class="summary-text">語順は <strong style="color: var(--blue);">主語 → be動詞 → not → 〜</strong></div>
  </div>
</div>

<div class="point-box">💡 ルールを覚えたら演習に進もう！</div>
</body>
</html>
