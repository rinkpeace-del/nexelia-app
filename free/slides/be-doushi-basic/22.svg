<svg xmlns="http://www.w3.org/2000/svg" width="1366" height="768" viewBox="0 0 1366 768" role="img" aria-label="主語がHe、She、Itのときのbe動詞はisを使う">
  <rect width="1366" height="768" fill="#efefef"/>

  <text x="683" y="280" text-anchor="middle" font-size="92" font-weight="700" font-family="'Noto Sans JP','Yu Gothic','Hiragino Kaku Gothic ProN',sans-serif" letter-spacing="0.4">
    <tspan fill="#2319b7">主語が He / She / It </tspan>
    <tspan fill="#111111">のとき</tspan>
  </text>

  <text x="683" y="490" text-anchor="middle" font-size="100" font-weight="700" font-family="'Noto Sans JP','Yu Gothic','Hiragino Kaku Gothic ProN',sans-serif" letter-spacing="0.4">
    <tspan fill="#ff3a3a">be動詞は is </tspan>
    <tspan fill="#111111">を使う</tspan>
  </text>

  <rect x="308" y="560" width="750" height="140" rx="24" ry="24" fill="#ffffff" stroke="#d0d0d0" stroke-width="2"/>
  <text x="683" y="622" text-anchor="middle" font-size="40" font-weight="700" font-family="'Noto Sans JP','Yu Gothic','Hiragino Kaku Gothic ProN',sans-serif" fill="#111111">
    <tspan>He is a student. / She is happy. / It is big.</tspan>
  </text>
</svg>
