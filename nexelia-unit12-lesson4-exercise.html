<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXELIA — Unit 12 レッスン4 · 演習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #D32F2F;
  --green: #1B873B; --green-light: #E6F4EA;
  --wrong: #C62828; --wrong-light: #FFEBEE;
  --text: #1A1A1A; --sub: #888; --border: #E8E8E8; --white: #FFFFFF; --bg: #F9F9F9;
  --brown: #4E342E; --brown-light: #EFEBE9;
}
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
nav { background: var(--white); border-bottom: 1px solid var(--border); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; flex-shrink: 0; }
.nav-logo { font-weight: 700; font-size: 20px; color: var(--red); letter-spacing: 0.08em; text-decoration: none; }
.nav-center { flex: 1; max-width: 400px; margin: 0 40px; display: flex; align-items: center; gap: 12px; }
.lesson-name { font-size: 13px; font-weight: 600; color: var(--sub); white-space: nowrap; }
.nav-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.nav-fill { height: 100%; background: var(--brown); border-radius: 2px; transition: width 0.5s ease; }
.nav-count { font-size: 12px; font-weight: 600; color: var(--sub); white-space: nowrap; }
.btn-exit { padding: 8px 18px; border-radius: 8px; border: 1.5px solid var(--border); background: white; font-size: 13px; font-weight: 600; color: var(--sub); text-decoration: none; }
.btn-exit:hover { border-color: #aaa; color: var(--text); }
main { flex: 1; display: flex; flex-direction: column; max-width: 680px; width: 100%; margin: 0 auto; padding: 36px 24px 28px; }
.slide { display: none; flex-direction: column; flex: 1; animation: fadeUp 0.3s ease both; }
.slide.active { display: flex; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.quiz-card { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 40px 44px; flex: 1; display: flex; flex-direction: column; gap: 24px; }
.q-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--brown); }
.q-text  { font-size: 20px; font-weight: 700; line-height: 1.5; }
.q-sub   { font-size: 14px; color: var(--sub); line-height: 1.6; }
.options { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: auto; }
.opt { padding: 16px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--white); font-size: 15px; font-weight: 700; color: var(--text); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; text-align: center; line-height: 1.5; transition: border-color 0.12s, background 0.12s, transform 0.1s; }
.opt:hover:not(:disabled) { border-color: var(--brown); background: var(--brown-light); transform: translateY(-2px); }
.opt.correct { background: var(--green-light); border-color: var(--green); color: var(--green); }
.opt.wrong   { background: var(--wrong-light); border-color: var(--wrong); color: var(--wrong); text-decoration: line-through; }
.opt:disabled { cursor: default; transform: none; }
.feedback { padding: 14px 18px; border-radius: 10px; font-size: 14px; font-weight: 600; display: none; line-height: 1.75; }
.feedback.show { display: block; }
.feedback.ok { background: var(--green-light); color: var(--green); }
.feedback.ng { background: var(--wrong-light); color: var(--wrong); }
.bottom-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
.btn-nav { padding: 12px 28px; border-radius: 10px; font-size: 14px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: all 0.15s; border: 1.5px solid var(--border); background: white; color: var(--sub); }
.btn-nav:hover:not(:disabled) { border-color: #aaa; color: var(--text); }
.btn-nav.primary { background: var(--brown); border-color: var(--brown); color: white; }
.btn-nav.primary:hover:not(:disabled) { opacity: 0.88; }
.btn-nav:disabled { opacity: 0.3; cursor: default; }
.dots { display: flex; gap: 7px; align-items: center; }
.dot { width: 7px; height: 7px; border-radius: 4px; background: var(--border); transition: width 0.2s, background 0.2s; }
.dot.done   { background: rgba(78,52,46,0.3); }
.dot.active { background: var(--brown); width: 22px; }
.complete-wrap { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 0; animation: fadeUp 0.4s ease both; }
.complete-wrap.active { display: flex; }
.complete-icon { font-size: 52px; margin-bottom: 20px; }
.complete-wrap h1 { font-size: 26px; font-weight: 700; margin-bottom: 12px; }
.score-badge { font-size: 34px; font-weight: 700; color: var(--brown); margin-bottom: 16px; }
.complete-wrap p { font-size: 15px; color: var(--sub); line-height: 1.85; margin-bottom: 32px; }
.complete-btns { display: flex; gap: 12px; }
.cbtn { padding: 13px 28px; border-radius: 10px; font-size: 14px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; text-decoration: none; transition: all 0.15s; }
.cbtn.primary { background: var(--brown); color: white; border: none; }
.cbtn.primary:hover { opacity: 0.88; }
.cbtn.secondary { background: white; color: var(--text); border: 1.5px solid var(--border); }
.cbtn.secondary:hover { border-color: #aaa; }
@media (max-width: 600px) { nav { padding: 0 16px; } .nav-center { display: none; } main { padding: 20px 16px; } .quiz-card { padding: 24px 18px; } }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">NEXELIA</a>
  <div class="nav-center">
    <span class="lesson-name">Unit 12 · 比較の疑問文 · 演習</span>
    <div class="nav-track"><div class="nav-fill" id="nav-fill" style="width:33%"></div></div>
    <span class="nav-count" id="nav-count">1 / 3</span>
  </div>
  <a href="nexelia-unit12-lesson4.html" class="btn-exit">← スライドへ</a>
</nav>

<main>

  <!-- Q1：超簡単 — Which か Who か -->
  <div class="slide active" id="s0">
    <div class="quiz-card">
      <div class="q-label">問題 1 / 3</div>
      <div class="q-text">（　）に入る正しい語はどれ？<br><span style="font-size:17px;color:var(--brown);">(　　) is taller, Ken or Bob?</span></div>
      <div class="q-sub">人について「どちらが〜？」と聞くときは何を使う？</div>
      <div class="options" id="o0">
        <button class="opt" data-correct="false">Which</button>
        <button class="opt" data-correct="true">Who</button>
        <button class="opt" data-correct="false">What</button>
        <button class="opt" data-correct="false">Where</button>
      </div>
      <div class="feedback" id="f0"></div>
    </div>
    <div class="bottom-nav">
      <button class="btn-nav" style="visibility:hidden">←</button>
      <div class="dots" id="d0"></div>
      <button class="btn-nav primary" id="n0" disabled>つぎへ →</button>
    </div>
  </div>

  <!-- Q2：普通 — 比較級の疑問文の語順 -->
  <div class="slide" id="s1">
    <div class="quiz-card">
      <div class="q-label">問題 2 / 3</div>
      <div class="q-text">日本語に合う英文はどれ？<br><span style="font-size:17px;color:var(--brown);">「この本とあの本では、どちらが長いですか？」</span></div>
      <div class="q-sub">2つを比べる疑問文の語順と、比較級・最上級の使い分けに注意！</div>
      <div class="options" id="o1">
        <button class="opt" data-correct="false">What is longer, this book or that one?</button>
        <button class="opt" data-correct="false">Which is the longest, this book or that one?</button>
        <button class="opt" data-correct="true">Which is longer, this book or that one?</button>
        <button class="opt" data-correct="false">Which longer is, this book or that one?</button>
      </div>
      <div class="feedback" id="f1"></div>
    </div>
    <div class="bottom-nav">
      <button class="btn-nav" id="back1">← もどる</button>
      <div class="dots" id="d1"></div>
      <button class="btn-nav primary" id="n1" disabled>つぎへ →</button>
    </div>
  </div>

  <!-- Q3：少し応用 — 最上級の疑問文（人） -->
  <div class="slide" id="s2">
    <div class="quiz-card">
      <div class="q-label">問題 3 / 3</div>
      <div class="q-text">日本語に合う英文はどれ？<br><span style="font-size:17px;color:var(--brown);">「あなたのクラスで一番足が速いのは誰ですか？」</span></div>
      <div class="q-sub">「誰が一番〜？」と聞く。fast の最上級にも注意！</div>
      <div class="options" id="o2">
        <button class="opt" data-correct="false">Which runs the fastest in your class?</button>
        <button class="opt" data-correct="false">What runs the fastest in your class?</button>
        <button class="opt" data-correct="false">Who runs most fast in your class?</button>
        <button class="opt" data-correct="true">Who runs the fastest in your class?</button>
      </div>
      <div class="feedback" id="f2"></div>
    </div>
    <div class="bottom-nav">
      <button class="btn-nav" id="back2">← もどる</button>
      <div class="dots" id="d2"></div>
      <button class="btn-nav primary" id="n2" disabled>結果を見る →</button>
    </div>
  </div>

  <!-- COMPLETE -->
  <div class="complete-wrap" id="complete">
    <div class="complete-icon" id="c-icon"></div>
    <h1 id="c-title"></h1>
    <div class="score-badge" id="c-score"></div>
    <p id="c-msg"></p>
    <div class="complete-btns">
      <a href="nexelia-unit12-lesson4.html" class="cbtn secondary">← スライドへ</a>
      <a href="lessons.html" class="cbtn primary">レッスン一覧へ →</a>
    </div>
  </div>

</main>

<script>
  const TOTAL = 3; let cur = 0; let correct = 0; const answered = {};
  const LESSON_ID = 'lesson45';
  const PROGRESS_KEY = 'nexeliaLessonProgress';

  function saveLessonProgress(value) {
    try {
      const progressMap = JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}');
      const nextValue = Math.max(Number(progressMap[LESSON_ID]) || 0, value);
      progressMap[LESSON_ID] = nextValue;
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(progressMap));
      localStorage.setItem('nexeliaLastLesson', LESSON_ID);
    } catch (_) {}
  }

  const FB = [
    {
      ok: '✓ 正解！人について「どちらが〜？」と聞くときは Who を使うよ。Which はものを比べるときに使うよ！',
      ng: '✗ 惜しい！人について聞くときは Who を使うよ。Which はものを比べるとき、What は「何が〜？」と聞くときだよ！'
    },
    {
      ok: '✓ 正解！2つを比べるときは比較級（longer）を使うよ。最上級（longest）は3つ以上のときだよ！',
      ng: '✗ 惜しい！2つを比べるときは比較級（longer）を使うよ。最上級（the longest）は3つ以上のとき。「Which is longer, A or B?」が正解だよ！'
    },
    {
      ok: '✓ 正解！人について聞くときは Who、fast の最上級は the fastest だよ。バッチリ！',
      ng: '✗ 惜しい！人について聞くときは Who を使うよ。また fast の最上級は the fastest（most fast ではない）だよ！'
    },
  ];
  function renderDots(id) {
    const el = document.getElementById('d' + id); if (!el) return; el.innerHTML = '';
    for (let i = 0; i < TOTAL; i++) { const d = document.createElement('div'); d.className = 'dot' + (i < id ? ' done' : i === id ? ' active' : ''); el.appendChild(d); }
  }
  function go(idx) {
    document.getElementById('s' + cur).classList.remove('active'); cur = idx;
    document.getElementById('s' + cur).classList.add('active');
    document.getElementById('nav-fill').style.width = ((cur + 1) / TOTAL * 100) + '%';
    document.getElementById('nav-count').textContent = (cur + 1) + ' / ' + TOTAL;
    renderDots(cur);
  }
  function finish() {
    document.getElementById('s2').classList.remove('active');
    document.getElementById('complete').classList.add('active');
    document.getElementById('nav-fill').style.width = '100%';
    if (correct === 3) saveLessonProgress(100);
    else if (correct === 2) saveLessonProgress(80);
    else saveLessonProgress(60);
    document.getElementById('nav-count').textContent = '完了';
    document.getElementById('c-score').textContent = correct + ' / ' + TOTAL + ' 問正解';
    if (correct === 3) {
      document.getElementById('c-icon').textContent = '🎉';
      document.getElementById('c-title').textContent = '全問正解！';
      document.getElementById('c-msg').innerHTML = 'Unit 12 比較、全レッスン完了！<br>すばらしい！';
    } else if (correct === 2) {
      document.getElementById('c-icon').textContent = '👍';
      document.getElementById('c-title').textContent = 'もう少し！';
      document.getElementById('c-msg').innerHTML = 'あと一歩！スライドをもう一度確認して<br>再チャレンジしよう。';
    } else {
      document.getElementById('c-icon').textContent = '📖';
      document.getElementById('c-title').textContent = 'スライドを見直そう';
      document.getElementById('c-msg').innerHTML = '比較の疑問文のスライドをもう一度確認してから<br>再チャレンジしよう！';
    }
  }
  for (var q = 0; q < TOTAL; q++) {
    (function(qIdx) {
      const opts = document.querySelectorAll('#o' + qIdx + ' .opt');
      opts.forEach(function(btn) {
        btn.addEventListener('click', function() {
          if (answered[qIdx]) return; answered[qIdx] = true;
          const isCorrect = btn.dataset.correct === 'true';
          if (isCorrect) correct++;
          opts.forEach(function(b) { b.disabled = true; if (b.dataset.correct === 'true') b.classList.add('correct'); });
          if (!isCorrect) btn.classList.add('wrong');
          const fb = document.getElementById('f' + qIdx);
          fb.classList.add('show', isCorrect ? 'ok' : 'ng');
          fb.textContent = isCorrect ? FB[qIdx].ok : FB[qIdx].ng;
          document.getElementById('n' + qIdx).disabled = false;
        });
      });
    })(q);
  }
  document.getElementById('n0').addEventListener('click', function() { go(1); });
  document.getElementById('n1').addEventListener('click', function() { go(2); });
  document.getElementById('n2').addEventListener('click', function() { finish(); });
  document.getElementById('back1').addEventListener('click', function() { go(0); });
  document.getElementById('back2').addEventListener('click', function() { go(1); });
  renderDots(0);
</script>
<script src="beta-badge.js"></script>
</body>
</html>
