  <style>
    :root {
      --brand: #1A56DB;
      --brand-dark: #1446B8;
      --line: #E8E8E8;
      --ink: #1A1A1A;
      --ink-2: #555555;
      --ink-3: #888888;
      --ink-4: #AAAAAA;
    }

    * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }

    body {
      margin: 0;
      background: #ffffff;
      color: var(--ink);
      font-family: 'Noto Sans JP', sans-serif;
    }

    .site-header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 100;
      height: 64px;
      display: flex;
      align-items: center;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 0 32px;
    }

    .logo {
      text-decoration: none;
      color: #D32F2F;
      font-weight: 800;
      font-size: 1.7rem;
      letter-spacing: 0.03em;
      display: inline-block;
      line-height: 1;
    }


    .lessons-page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 56px 40px;
    }

    .hero {
      margin-bottom: 36px;
    }

    .hero h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      color: var(--ink);
    }

    .hero-beta-note {
      margin: 10px 0 0;
      color: var(--ink-4);
      font-size: 13px;
      line-height: 1.7;
      font-weight: 400;
    }

    .units-list {
      display: flex;
      flex-direction: column;
      gap: 56px;
    }

    .unit-head {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .unit-label {
      color: #999;
      font-size: 11px;
      letter-spacing: .1em;
      font-weight: 700;
      text-transform: uppercase;
    }

    .unit-title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
    }


    .unit-count {
      color: var(--ink-3);
      font-size: 13px;
    }

    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .lesson-card {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: box-shadow .2s, transform .2s;
    }

    .lesson-card.is-clickable {
      cursor: pointer;
    }

    .lesson-card.is-clickable:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .lesson-card.is-clickable:focus-visible {
      outline: 2px solid var(--brand);
      outline-offset: 2px;
    }

    /* Unit 5以降は無効化状態 */
    .lesson-card.is-disabled {
      opacity: 0.6;
      cursor: not-allowed;
      pointer-events: none;
    }

    .lesson-card.is-disabled:hover {
      transform: none;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }


    .card-title {
      margin: 8px 0 2px;
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.5;
      min-height: 48px;
    }

    .card-desc {
      margin: 0 0 4px;
      font-size: 12px;
      color: var(--ink-3);
      line-height: 1.6;
      flex: 1;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .card-minutes {
      font-size: 11px;
      color: var(--ink-4);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .card-minutes svg {
      width: 12px;
      height: 12px;
      stroke: var(--ink-4);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-difficulty {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 999px;
    }

    .card-difficulty.easy {
      background: #ECFDF5;
      color: #059669;
    }

    .card-difficulty.normal {
      background: #EFF6FF;
      color: #3B82F6;
    }

    .card-difficulty.hard {
      background: #FEF3C7;
      color: #D97706;
    }

    .premium-divider {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin: 48px 0 40px;
    }
    .premium-divider-line {
      width: 100%;
      height: 1px;
      background: #E8E8E8;
    }
    .premium-divider-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
      color: #555;
      white-space: nowrap;
      flex-wrap: wrap;
      justify-content: center;
      text-align: center;
    }
    .premium-divider-lock { font-size: 16px; }
    .premium-divider-link {
      color: #1A56DB;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
    }
    .premium-divider-link:hover { text-decoration: underline; }

    .card-paid {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 999px;
      background: #FFF3E0;
      color: #E65100;
      border: 1px solid #FFCC80;
    }


    @media (max-width: 980px) {
      .lessons-page { padding: 40px 20px; }
      .lesson-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    @media (max-width: 640px) {
      .site-header { height: 58px; }
      .topbar { padding: 0 14px; }
      .logo { font-size: 1.35rem; }
      .lessons-page { padding: 28px 14px; }
      .hero h1 { font-size: 24px; }
      .overall { padding: 18px 16px; margin-bottom: 36px; }
      .overall-row { gap: 10px; }
      .overall-label, .overall-percent { font-size: 12px; }
      .units-list { gap: 36px; }
      .unit-head { margin-bottom: 16px; }
      .lesson-grid { grid-template-columns: 1fr; gap: 12px; }
      .card-title { font-size: 16px; min-height: 0; }
    }
  </style>

    const unitsContainer = document.getElementById("unitsContainer");
    const CHECK_SVG = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><polyline points="20 6 9 17 4 12"/></svg>`;

    function getUnitNumber(unitLabel) {
      const match = String(unitLabel || "").match(/UNIT\s*(\d+)/i);
      return match ? Number(match[1]) : NaN;
    }

    function createLessonCard(lesson, unitLabel) {
      const isDisabled = false;

      const card = document.createElement("article");
      card.className = "lesson-card";


const CLOCK_SVG = `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
      const diffClass = lesson.difficulty || "normal";
      const diffLabel = lesson.difficultyLabel || "ふつう";
      const minutes = lesson.minutes ? `約${lesson.minutes}分` : "";

      card.innerHTML = `
<p class="card-title">${lesson.title}</p>
        ${lesson.desc ? `<p class="card-desc">${lesson.desc}</p>` : ""}
        <div class="card-meta">
          ${minutes ? `<span class="card-minutes">${CLOCK_SVG}${minutes}</span>` : ""}
          <span class="card-difficulty ${diffClass}">${diffLabel}</span>
          ${isDisabled ? `<span class="card-paid">有料</span>` : ""}
        </div>
      `;

      card.classList.add("is-clickable");
      if (isDisabled) {
        card.classList.add("is-disabled");
      }
      card.setAttribute("role", "link");
      card.tabIndex = isDisabled ? -1 : 0;
      card.setAttribute("aria-label", `${lesson.title}${isDisabled ? " (有料)" : " を開く"}`);

      const goToLesson = () => {
        if (isDisabled) {
          window.open("https://nexelia.base.shop/items/142047103", "_blank", "noopener");
          return;
        }
        if (!lesson.href || lesson.href === "#") return;
        try {
          localStorage.setItem("nexeliaLastLesson", lesson.id);
        } catch (_) {}
        window.location.href = lesson.href;
      };

      card.addEventListener("click", goToLesson);
      card.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          if (!isDisabled) {
            goToLesson();
          }
        }
      });

      return { card };
    }

    units.forEach((unit) => {

      const section = document.createElement("section");
      const grid = document.createElement("div");
      grid.className = "lesson-grid";

      unit.lessons.forEach((lesson) => {
        const { card } = createLessonCard(lesson, unit.label);
        grid.appendChild(card);
      });

      const head = document.createElement("header");
      head.className = "unit-head";
      head.innerHTML = `
        <span class="unit-label">${unit.label}</span>
        <h2 class="unit-title">${unit.title}</h2>
      `;

      section.append(head, grid);
      unitsContainer.appendChild(section);
    });


  </script>
