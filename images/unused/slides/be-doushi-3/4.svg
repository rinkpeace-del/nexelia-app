<svg xmlns="http://www.w3.org/2000/svg" width="1366" height="768" viewBox="0 0 1366 768" role="img" aria-labelledby="title desc">
  <title id="title">be動詞③ 短縮形 You are のとき</title>
  <desc id="desc">You are から You're への短縮を説明するスライド</desc>
  <rect width="1366" height="768" fill="#ececef" />

  <text x="683" y="100" text-anchor="middle" fill="#2018b5" font-family="'Noto Sans JP', 'Yu Gothic', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="54" font-weight="700">
    Next Study 英語文法｜be動詞③｜短縮形
  </text>

  <text x="683" y="245" text-anchor="middle" fill="#ff7a1a" font-family="'Noto Sans JP', 'Yu Gothic', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="110" font-weight="700">
    You areのとき
  </text>

  <text x="520" y="455" text-anchor="middle" fill="#000000" font-family="'Arial Black', 'Noto Sans JP', sans-serif" font-size="118" font-weight="900">
    You are →
  </text>
  <text x="900" y="455" text-anchor="middle" fill="#ff3540" font-family="'Arial Black', 'Noto Sans JP', sans-serif" font-size="118" font-weight="900">
    You're
  </text>

  <rect x="24" y="540" width="1318" height="220" fill="none" stroke="#111111" stroke-width="10" stroke-dasharray="14 12" />

  <text x="76" y="680" fill="#000000" font-family="'Arial Black', 'Noto Sans JP', sans-serif" font-size="112" font-weight="900">
    You are happy.→
  </text>
  <text x="772" y="680" fill="#ff3540" font-family="'Arial Black', 'Noto Sans JP', sans-serif" font-size="112" font-weight="900">
    You’re
  </text>
  <text x="1048" y="680" fill="#000000" font-family="'Arial Black', 'Noto Sans JP', sans-serif" font-size="112" font-weight="900">
    happy
  </text>
</svg>
