<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="be動詞は主語で形が決まる">
  <rect width="1600" height="900" fill="#f2f2f2"/>

  <text x="800" y="260" text-anchor="middle" font-family="Yu Gothic UI, Yu Gothic, Meiryo, sans-serif" font-size="92" font-weight="700" fill="#111111">
    <tspan>be動詞は</tspan><tspan fill="#2620b8">主語</tspan><tspan>で形が決まる</tspan>
  </text>

  <text x="800" y="650" text-anchor="middle" font-family="Yu Gothic UI, Yu Gothic, Meiryo, sans-serif" font-size="88" font-weight="700" fill="#111111">
