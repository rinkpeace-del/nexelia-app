<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1366 768" width="1366" height="768" role="img" aria-label="主語で形が決まる">
  <rect width="1366" height="768" fill="#f2f2f2" />

  <text x="683" y="72" text-anchor="middle" dominant-baseline="middle" font-family="'Yu Gothic UI','Hiragino Kaku Gothic ProN',sans-serif" font-size="52" font-weight="700" fill="#1f27b8">
    be動詞① ｜ be動詞の基本
  </text>

  <text x="683" y="195" text-anchor="middle" dominant-baseline="middle" font-family="'Yu Gothic UI','Hiragino Kaku Gothic ProN',sans-serif" font-size="82" font-weight="800" fill="#111111">
    <tspan fill="#281bb3">主語</tspan><tspan fill="#111111">で形が決まる</tspan>
  </text>

  <text x="300" y="305" text-anchor="start" dominant-baseline="middle" font-family="'Yu Gothic UI','Hiragino Kaku Gothic ProN',sans-serif" font-size="88" font-weight="800" fill="#281bb3">I</text>
  <text x="400" y="305" text-anchor="start" dominant-baseline="middle" font-family="'Yu Gothic UI','Hiragino Kaku Gothic ProN',sans-serif" font-size="88" font-weight="800" fill="#111111">→</text>
  <text x="540" y="305" text-anchor="start" dominant-baseline="middle" font-family="'Yu Gothic UI','Hiragino Kaku Gothic ProN',sans-serif" font-size="88" font-weight="800" fill="#ff3b3b">am</text>

  <text x="300" y="420" text-anchor="start" dominant-baseline="middle" font-family="'Yu Gothic UI','Hiragino Kaku Gothic ProN',sans-serif" font-size="88" font-weight="800" fill="#281bb3">you</text>
  <text x="500" y="420" text-anchor="start" dominant-baseline="middle" font-family="'Yu Gothic UI','Hiragino Kaku Gothic ProN',sans-serif" font-size="88" font-weight="800" fill="#111111">→</text>
  <text x="640" y="420" text-anchor="start" dominant-baseline="middle" font-family="'Yu Gothic UI','Hiragino Kaku Gothic ProN',sans-serif" font-size="88" font-weight="800" fill="#ff3b3b">are</text>

  <text x="300" y="535" text-anchor="start" dominant-baseline="middle" font-family="'Yu Gothic UI','Hiragino Kaku Gothic ProN',sans-serif" font-size="88" font-weight="800" fill="#281bb3">he / she / it</text>
  <text x="760" y="535" text-anchor="start" dominant-baseline="middle" font-family="'Yu Gothic UI','Hiragino Kaku Gothic ProN',sans-serif" font-size="88" font-weight="800" fill="#111111">→</text>
  <text x="885" y="535" text-anchor="start" dominant-baseline="middle" font-family="'Yu Gothic UI','Hiragino Kaku Gothic ProN',sans-serif" font-size="88" font-weight="800" fill="#ff3b3b">is</text>

  <circle cx="150" cy="670" r="16" fill="#f2cc4d" />
  <text x="683" y="670" text-anchor="middle" dominant-baseline="middle" font-family="'Yu Gothic UI','Hiragino Kaku Gothic ProN',sans-serif" font-size="62" font-weight="800" fill="#111111">
    <tspan fill="#281bb3">主語</tspan><tspan fill="#111111">を見れば、</tspan><tspan fill="#ff3b3b">be動詞</tspan>
  </text>
  <text x="683" y="735" text-anchor="middle" dominant-baseline="middle" font-family="'Yu Gothic UI','Hiragino Kaku Gothic ProN',sans-serif" font-size="62" font-weight="800" fill="#111111">
    は自動で決まる
  </text>
</svg>
