<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NEXELIA 登録完了" />
  <title>登録完了 | NEXELIA</title>
  <link rel="stylesheet" href="stylesheet.css" />
  <style>
    .done {
      text-align: center;
      max-width: 640px;
      margin: 80px auto;
    }
    .done p { color: var(--muted); }
  </style>
</head>
<body>
  <main class="container">
    <section class="done page-card">
      <h1>登録を受け付けました</h1>
      <p id="welcomeMsg">まずは英語から、短いインプットと演習を始めましょう。</p>
      <a class="btn-primary" href="lessons.html">レッスン一覧へ</a>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name") || "";
    if (name.trim()) {
      localStorage.setItem("nexeliaUserName", name.trim());
      document.getElementById("welcomeMsg").textContent =
        `ようこそ、${name.trim()}さん！さっそく学習を始めましょう。`;
    }
  </script>
  <script src="ai-chat.js"></script>
</body>
</html>
