<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXELIA | 助動詞(can)の基本</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #1a56db;
      --red: #d32f2f;
      --line: #e8e8e8;
      --text: #1a1a1a;
      --sub: #707070;
      --bg: #f9f9f9;
      --white: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Noto Sans JP", sans-serif; background: var(--bg); color: var(--text); }
    header {
      height: 64px;
      border-bottom: 1px solid var(--line);
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .logo {
      color: var(--red);
      text-decoration: none;
      font-weight: 800;
      letter-spacing: 0.06em;
      font-size: 28px;
      line-height: 1;
    }
    .back {
      text-decoration: none;
      color: var(--sub);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 14px;
      font-weight: 700;
      font-size: 14px;
      background: var(--white);
    }
    main { max-width: 880px; margin: 34px auto; padding: 0 16px; }
    .card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 34px;
      display: grid;
      gap: 14px;
    }
    .label { color: var(--blue); font-size: 14px; font-weight: 700; }
    h1 { font-size: 34px; line-height: 1.25; }
    p { color: var(--sub); line-height: 1.8; font-size: 16px; }
    .actions { margin-top: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      text-decoration: none;
      border-radius: 12px;
      padding: 11px 18px;
      font-size: 15px;
      font-weight: 700;
      display: inline-block;
    }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-secondary { border: 1px solid var(--line); color: var(--text); background: var(--white); }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">NEXELIA</a>
    <a href="lessons.html" class="back">← 一覧へ</a>
  </header>

  <main>
    <section class="card">
      <div class="label">UNIT 5 ・ 助動詞(can)</div>
      <h1>助動詞(can)の基本</h1>
      <p>このレッスンのスライドは次の更新で反映できます。今はUNIT 1〜4を先に進められます。</p>
      <div class="actions">
        <a href="lessons.html" class="btn btn-primary">レッスン一覧へ戻る</a>
        <a href="nexelia-study18.html" class="btn btn-secondary">前のレッスンを見る</a>
      </div>
    </section>
  </main>
<script src="ai-chat.js"></script>
<script src="beta-badge.js"></script>
</body>
</html>
