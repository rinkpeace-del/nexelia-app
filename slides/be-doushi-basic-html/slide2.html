<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #1A56DB;
  --blue-light: #E8F0FE;
  --sub: #888;
  --border: #E8E8E8;
  --bg: #F9F9F9;
  --text: #1A1A1A;
  --white: #FFFFFF;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #fff;
  color: var(--text);
  padding: 40px 48px 56px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  overflow: auto;
  scrollbar-width: none;
}
body::-webkit-scrollbar { display: none; }
.slide-label { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; color: var(--blue); }
.concept-block { display: flex; flex-direction: column; gap: 10px; }
.concept-title { font-size: 13px; font-weight: 600; color: var(--sub); }
.concept-text { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1.4; }
.equal-visual { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 12px 0; }
.equal-box { display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; }
.eq-item {
  flex: 1;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 20px 16px;
  text-align: center;
  font-size: 18px;
  font-weight: 700;
}
.eq-item .label { font-size: 11px; color: var(--sub); font-weight: 500; margin-bottom: 6px; }
.eq-sign-big { font-size: 36px; font-weight: 700; color: var(--blue); flex-shrink: 0; }
.eq-examples { width: 100%; display: flex; flex-direction: column; gap: 8px; }
.eq-ex {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 15px;
}
.eq-ex .en { font-weight: 700; flex: 1; }
.eq-ex .en .be { color: var(--blue); }
.eq-ex .arrow { color: var(--sub); font-size: 13px; }
.eq-ex .meaning { color: var(--sub); font-size: 13px; flex: 1; text-align: right; }
.point-box {
  background: var(--blue-light);
  border-radius: 10px;
  padding: 14px 18px;
  font-size: 14px;
  color: var(--blue);
  font-weight: 600;
  line-height: 1.65;
}
@media (max-width: 600px) {
  body { padding: 24px 20px 36px; gap: 20px; }
  .concept-text { font-size: 24px; }
  .equal-box { flex-direction: column; }
  .eq-sign-big { transform: rotate(90deg); }
  .eq-ex { flex-wrap: wrap; }
  .eq-ex .meaning { text-align: left; }
}
</style>
</head>
<body>

<div class="slide-label">be動詞の基本 · スライド 2</div>

<div class="concept-block">
  <div class="concept-title">このスライドで学ぶこと</div>
  <div class="concept-text">まずは<span style="color:var(--blue)">「＝」</span>の意味を覚えよう</div>
</div>

<div class="equal-visual">
  <div class="equal-box">
    <div class="eq-item">
      <div class="label">主語 (A)</div>
      I / She / They…
    </div>
    <div class="eq-sign-big">=</div>
    <div class="eq-item">
      <div class="label">説明 (B)</div>
      名前・状態・職業…
    </div>
  </div>

  <div style="font-size:15px;color:var(--sub);text-align:center;line-height:1.7;">
    am / is / are は全部<br>
    <strong style="color:var(--text);font-size:18px;">「＝（イコール）」</strong> の意味だけ
  </div>

  <div class="eq-examples">
    <div class="eq-ex">
      <span class="en">I <span class="be">am</span> Yuki.</span>
      <span class="arrow">→</span>
      <span class="meaning">私 ＝ ゆき</span>
    </div>
    <div class="eq-ex">
      <span class="en">She <span class="be">is</span> a doctor.</span>
      <span class="arrow">→</span>
      <span class="meaning">彼女 ＝ 医者</span>
    </div>
    <div class="eq-ex">
      <span class="en">We <span class="be">are</span> happy.</span>
      <span class="arrow">→</span>
      <span class="meaning">私たち ＝ 幸せ</span>
    </div>
  </div>
</div>

<div class="point-box">💡 am・is・are の形は違っても、意味は全部「＝」のひとつだけ。まずここを覚えよう！</div>

<script src="../../ai-chat.js"></script>
</body>
</html>
