<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red: #D32F2F;
  --blue: #1A56DB;
  --blue-dark: #1446B8;
  --blue-light: #E8F0FE;
  --text: #1A1A1A;
  --sub: #888;
  --border: #E8E8E8;
  --white: #FFFFFF;
  --bg: #F9F9F9;
  --green: #1B873B;
  --green-light: #E6F4EA;
  --orange: #E65100;
  --orange-light: #FFF3E0;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* NAV */
nav {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; flex-shrink: 0;
}
.nav-logo { font-weight: 700; font-size: 20px; color: var(--red); letter-spacing: 0.08em; text-decoration: none; }
.nav-center { flex: 1; max-width: 400px; margin: 0 40px; display: flex; align-items: center; gap: 12px; }
.lesson-name { font-size: 13px; font-weight: 600; color: var(--sub); white-space: nowrap; }
.nav-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.nav-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.4s ease; }
.nav-count { font-size: 12px; font-weight: 600; color: var(--sub); white-space: nowrap; }
.btn-exit { padding: 8px 18px; border-radius: 8px; border: 1.5px solid var(--border); background: white; font-size: 13px; font-weight: 600; color: var(--sub); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; text-decoration: none; transition: border-color 0.15s, color 0.15s; }
.btn-exit:hover { border-color: #aaa; color: var(--text); }

/* MAIN */
main {
  flex: 1; display: flex; flex-direction: column;
  max-width: 720px; width: 100%; margin: 0 auto; padding: 36px 24px 28px;
}

/* SLIDE */
.slide { display: none; flex-direction: column; flex: 1; animation: fadeUp 0.3s ease both; }
.slide.active { display: flex; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* SLIDE CARD */
.slide-card {
  background: var(--white);
  border-radius: 20px;
  padding: 44px 52px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.slide-label { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; color: var(--blue); }
.concept-title { font-size: 13px; font-weight: 600; color: var(--sub); margin-bottom: 8px; }
.concept-text  { font-size: 26px; font-weight: 700; line-height: 1.4; }
.concept-text .accent { color: var(--blue); }

/* be動詞 vs 一般動詞 比較 */
.compare { display: flex; flex-direction: column; gap: 10px; }
.compare-row {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 20px; border-radius: 14px;
  font-size: 16px; font-weight: 700;
}
.compare-row.be   { background: var(--blue-light); border: 1.5px solid #C5D8FD; }
.compare-row.gen  { background: var(--green-light); border: 1.5px solid #A5D6A7; }
.compare-badge {
  font-size: 11px; font-weight: 700; padding: 4px 10px;
  border-radius: 20px; flex-shrink: 0; white-space: nowrap;
}
.compare-row.be  .compare-badge { background: var(--blue); color: white; }
.compare-row.gen .compare-badge { background: var(--green); color: white; }
.compare-row.be  .compare-text { color: var(--blue); }
.compare-row.gen .compare-text { color: var(--green); }

/* 例文リスト */
.ex-list { display: flex; flex-direction: column; gap: 10px; }
.ex-single {
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.ex-single .en {
  padding: 16px 22px;
  font-size: 19px; font-weight: 700;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  letter-spacing: 0.02em;
}
.ex-single .en .verb { color: var(--green); }
.ex-single .jp {
  padding: 12px 22px;
  font-size: 14px; color: var(--sub);
  background: var(--bg);
}

/* 語順ボックス */
.order-row { display: flex; align-items: stretch; gap: 8px; }
.order-cell {
  flex: 1; padding: 16px 12px; text-align: center;
  border-radius: 12px; font-size: 15px; font-weight: 700; line-height: 1.4;
}
.order-cell .label { font-size: 10px; font-weight: 500; color: var(--sub); display: block; margin-bottom: 6px; }
.order-cell.subj { background: #F3F4F6; }
.order-cell.verb { background: var(--green-light); color: var(--green); }
.order-cell.rest { background: #F3F4F6; }
.order-plus { display: flex; align-items: center; color: var(--sub); font-size: 18px; font-weight: 700; }

/* ポイントボックス */
.point-box {
  background: var(--blue-light);
  border-radius: 12px;
  padding: 18px 22px;
  font-size: 15px; color: var(--blue);
  font-weight: 600; line-height: 1.7;
  margin-top: auto;
}

/* まとめリスト */
.summary-list { display: flex; flex-direction: column; gap: 12px; }
.summary-item {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 20px; background: var(--white);
  border: 1px solid var(--border); border-radius: 12px;
}
.summary-num {
  width: 26px; height: 26px; background: var(--blue); color: white;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.summary-text { font-size: 15px; font-weight: 600; line-height: 1.6; }

/* BOTTOM NAV */
.bottom-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
.btn-nav { padding: 12px 28px; border-radius: 10px; font-size: 14px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: all 0.15s; border: 1.5px solid var(--border); background: white; color: var(--sub); }
.btn-nav:hover { border-color: #aaa; color: var(--text); }
.btn-nav.primary { background: var(--blue); border-color: var(--blue); color: white; }
.btn-nav.primary:hover { background: var(--blue-dark); }

.dots { display: flex; gap: 6px; align-items: center; }
.dot { width: 6px; height: 6px; border-radius: 3px; background: var(--border); transition: width 0.2s, background 0.2s; }
.dot.done   { background: rgba(26,86,219,0.3); }
.dot.active { background: var(--blue); width: 20px; }

@media (max-width: 600px) {
  nav { padding: 0 16px; }
  .nav-center { display: none; }
  main { padding: 20px 16px; }
  .slide-card { padding: 28px 20px; gap: 20px; }
}

html, body { background: #fff; }
body {
  min-height: 0;
  padding: 24px;
  display: block;
}
main {
  max-width: none;
  margin: 0;
  padding: 0;
}
.slide { display: block !important; }
.slide-card { flex: none; }

</style>
</head>
<body>
<main>
  <div class="slide-card">
    <div>
        <div class="concept-title">このスライドで学ぶこと</div>
        <div class="concept-text">よく使う<span class="accent">一般動詞</span></div>
      </div>

      <div class="ex-list">
        <div class="ex-single">
          <div class="en"><span class="verb">like</span> 〜が好き</div>
          <div class="jp">I like music. ／ 私は音楽が好きです。</div>
        </div>
        <div class="ex-single">
          <div class="en"><span class="verb">have</span> 〜を持っている</div>
          <div class="jp">I have a dog. ／ 私は犬を飼っています。</div>
        </div>
        <div class="ex-single">
          <div class="en"><span class="verb">play</span> 〜をする・演奏する</div>
          <div class="jp">I play soccer. ／ 私はサッカーをします。</div>
        </div>
        <div class="ex-single">
          <div class="en"><span class="verb">go</span> 行く</div>
          <div class="jp">I go to school. ／ 私は学校に行きます。</div>
        </div>
      </div>

      <div class="point-box">💡 動作（する・行く）や状態（好き・持っている）を表す動詞が一般動詞！</div>
  </div>
</main>
</body>
</html>
