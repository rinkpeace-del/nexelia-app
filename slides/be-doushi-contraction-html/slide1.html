<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #1A56DB;
  --blue-dark: #1446B8;
  --blue-light: #E8F0FE;
  --text: #1A1A1A;
  --sub: #888;
  --border: #E8E8E8;
  --white: #FFFFFF;
  --bg: #F9F9F9;
  --wrong: #C62828;
  --wrong-light: #FFEBEE;
  --green: #1B873B;
  --green-light: #E6F4EA;
  --orange: #E65100;
  --orange-light: #FFF3E0;
  --purple: #7C3AED;
  --purple-light: #EDE9FE;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--white);
  color: var(--text);
  padding: 40px 48px 56px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  overflow: auto;
  scrollbar-width: none;
}
body::-webkit-scrollbar { display: none; }
.slide-label { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; color: var(--blue); }
.concept-title { font-size: 13px; font-weight: 600; color: var(--sub); margin-bottom: 8px; }
.concept-text { font-size: 26px; font-weight: 700; line-height: 1.4; }
.concept-text .accent { color: var(--blue); }
.convert-list, .neg-list { display: flex; flex-direction: column; gap: 10px; }
.convert-row, .neg-row {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: var(--white);
}
.convert-from { font-size: 17px; font-weight: 700; color: var(--sub); flex: 1; }
.convert-arrow, .neg-arrow { font-size: 16px; color: var(--sub); flex-shrink: 0; }
.convert-to {
  font-size: 17px; font-weight: 700;
  color: var(--purple);
  background: var(--purple-light);
  border-radius: 8px;
  padding: 4px 14px;
  flex-shrink: 0;
}
.neg-from { font-size: 17px; font-weight: 700; color: var(--wrong); flex: 1; }
.neg-to {
  font-size: 17px; font-weight: 700;
  color: var(--wrong);
  background: var(--wrong-light);
  border-radius: 8px;
  padding: 4px 14px;
  flex-shrink: 0;
}
.ex-single { border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.ex-single .en {
  padding: 18px 24px;
  font-size: 20px;
  font-weight: 700;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  letter-spacing: 0.02em;
}
.ex-single .en .short { color: var(--purple); }
.ex-single .jp {
  padding: 14px 24px;
  font-size: 15px;
  color: var(--sub);
  background: var(--bg);
}
.caution-box {
  background: var(--orange-light);
  border: 1.5px solid #FFCC80;
  border-radius: 12px;
  padding: 16px 20px;
  font-size: 14px;
  font-weight: 600;
  color: var(--orange);
  line-height: 1.7;
}
.summary-list { display: flex; flex-direction: column; gap: 12px; }
.summary-item {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 20px; background: var(--white);
  border: 1px solid var(--border); border-radius: 12px;
}
.summary-num {
  width: 26px; height: 26px; background: var(--blue); color: #fff;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.summary-text { font-size: 15px; font-weight: 600; line-height: 1.6; }
.point-box {
  background: var(--blue-light);
  border-radius: 12px;
  padding: 18px 22px;
  font-size: 15px;
  color: var(--blue);
  font-weight: 600;
  line-height: 1.7;
  margin-top: auto;
}
</style>
</head>
<body><div class="slide-label">be動詞の短縮形 · スライド 1</div>
<div>
  <div class="concept-title">このスライドで学ぶこと</div>
  <div class="concept-text"><span class="accent">短縮形</span>とは？</div>
</div>

<div class="convert-list">
  <div class="convert-row">
    <span class="convert-from">I am</span>
    <span class="convert-arrow">→</span>
    <span class="convert-to">I'm</span>
  </div>
</div>

<div class="ex-single">
  <div class="en">I am happy. → <span class="short">I'm</span> happy.</div>
  <div class="jp">私は幸せです。</div>
</div>

<div class="point-box">💡 短縮形は会話でよく使う形。I am を I'm のように短く書くよ。</div>
</body>
</html>
