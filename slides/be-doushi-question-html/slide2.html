<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #1A56DB;
  --blue-light: #E8F0FE;
  --text: #1A1A1A;
  --sub: #888;
  --border: #E8E8E8;
  --white: #FFFFFF;
  --bg: #F9F9F9;
  --wrong: #C62828;
  --wrong-light: #FFEBEE;
  --green: #1B873B;
  --green-light: #E6F4EA;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--white);
  color: var(--text);
  padding: 40px 48px 56px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  overflow: auto;
  scrollbar-width: none;
}
body::-webkit-scrollbar { display: none; }
.slide-label { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; color: var(--blue); }
.concept-title { font-size: 13px; font-weight: 600; color: var(--sub); margin-bottom: 8px; }
.concept-text { font-size: 26px; font-weight: 700; line-height: 1.4; }
.concept-text .accent { color: var(--blue); }
.answer-block { display: flex; flex-direction: column; gap: 10px; }
.answer-q {
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 24px;
  font-size: 18px;
  font-weight: 700;
  background: var(--bg);
  color: var(--sub);
}
.answer-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 22px;
  border-radius: 14px;
  font-size: 18px;
  font-weight: 700;
}
.answer-row.yes { background: var(--green-light); border: 1.5px solid #A5D6A7; color: var(--green); }
.answer-row.no  { background: var(--wrong-light); border: 1.5px solid #FFCDD2; color: var(--wrong); }
.answer-badge {
  font-size: 12px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  flex-shrink: 0;
}
.answer-row.yes .answer-badge { background: var(--green); color: #fff; }
.answer-row.no .answer-badge { background: var(--wrong); color: #fff; }
.point-box {
  background: var(--blue-light);
  border-radius: 12px;
  padding: 18px 22px;
  font-size: 15px;
  color: var(--blue);
  font-weight: 600;
  line-height: 1.7;
  margin-top: auto;
}
</style>
</head>
<body>
  <div class="slide-label">be動詞の疑問文 · スライド 2</div>
  <div>
    <div class="concept-title">このスライドで学ぶこと</div>
    <div class="concept-text">疑問文の<span class="accent">答え方</span></div>
  </div>

  <div class="answer-block">
    <div class="answer-q">Are you a student?</div>
    <div class="answer-row yes">
      <span class="answer-badge">YES</span>
      Yes, I am.
    </div>
    <div class="answer-row no">
      <span class="answer-badge">NO</span>
      No, I'm not.
    </div>
  </div>

  <div class="point-box">💡 Yes なら「主語 + be動詞」、No なら「主語 + be動詞 + not」を続ける。</div>
</body>
</html>
