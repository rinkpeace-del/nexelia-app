<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #1A56DB;
  --blue-dark: #1446B8;
  --blue-light: #E8F0FE;
  --text: #1A1A1A;
  --sub: #888;
  --border: #E8E8E8;
  --white: #FFFFFF;
  --bg: #F9F9F9;
  --purple: #7C3AED;
  --purple-light: #EDE9FE;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--white);
  color: var(--text);
  padding: 40px 48px 56px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  overflow: auto;
  scrollbar-width: none;
}
body::-webkit-scrollbar { display: none; }
.slide-label { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; color: var(--blue); }
.concept-title { font-size: 13px; font-weight: 600; color: var(--sub); margin-bottom: 8px; }
.concept-text { font-size: 26px; font-weight: 700; line-height: 1.4; }
.concept-text .accent { color: var(--blue); }
.transform-block { display: flex; flex-direction: column; gap: 10px; }
.transform-row { border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.transform-row .en {
  padding: 18px 24px;
  font-size: 20px;
  font-weight: 700;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  letter-spacing: 0.02em;
}
.transform-row.question .en {
  background: var(--purple-light);
  border-bottom-color: #D4BCFF;
}
.transform-row .en .be { color: var(--blue); }
.transform-row.question .en .be { color: var(--purple); }
.transform-row .jp {
  padding: 12px 24px;
  font-size: 14px;
  color: var(--sub);
  background: var(--bg);
}
.transform-row.question .jp { background: #F5F0FF; }
.transform-arrow {
  font-size: 13px;
  font-weight: 600;
  color: var(--sub);
  padding: 0 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.transform-arrow::before { content: '→'; font-size: 16px; }
.point-box {
  background: var(--blue-light);
  border-radius: 12px;
  padding: 18px 22px;
  font-size: 15px;
  color: var(--blue);
  font-weight: 600;
  line-height: 1.7;
  margin-top: auto;
}
</style>
</head>
<body>
  <div class="slide-label">be動詞の疑問文 · スライド 1</div>
  <div>
    <div class="concept-title">このスライドで学ぶこと</div>
    <div class="concept-text">疑問文の<span class="accent">作り方</span></div>
  </div>

  <div class="transform-block">
    <div class="transform-row">
      <div class="en">You <span class="be">are</span> a student.</div>
      <div class="jp">あなたは学生だ。</div>
    </div>
    <div class="transform-arrow">be動詞を文の先頭へ移動</div>
    <div class="transform-row question">
      <div class="en"><span class="be">Are</span> you a student?</div>
      <div class="jp">あなたは学生ですか？</div>
    </div>
  </div>

  <div class="point-box">💡 be動詞を文の先頭に出すだけ！</div>
<script src="../../ai-chat.js"></script>
</body>
</html>
