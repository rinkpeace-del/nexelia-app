<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #1A56DB;
  --blue-light: #E8F0FE;
  --text: #1A1A1A;
  --sub: #888;
  --border: #E8E8E8;
  --white: #FFFFFF;
  --bg: #F9F9F9;
  --wrong: #C62828;
  --green: #1B873B;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--white);
  color: var(--text);
  padding: 40px 48px 56px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  overflow: auto;
  scrollbar-width: none;
}
body::-webkit-scrollbar { display: none; }
.slide-label { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; color: var(--blue); }
.concept-title { font-size: 13px; font-weight: 600; color: var(--sub); margin-bottom: 8px; }
.concept-text { font-size: 26px; font-weight: 700; line-height: 1.4; }
.summary-list { display: flex; flex-direction: column; gap: 12px; }
.summary-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.summary-num {
  width: 26px;
  height: 26px;
  background: var(--blue);
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}
.summary-text { font-size: 15px; font-weight: 600; line-height: 1.6; }
.point-box {
  background: var(--blue-light);
  border-radius: 12px;
  padding: 18px 22px;
  font-size: 15px;
  color: var(--blue);
  font-weight: 600;
  line-height: 1.7;
  margin-top: auto;
}
</style>
</head>
<body>
  <div class="slide-label">be動詞の疑問文 · まとめ</div>
  <div>
    <div class="concept-title">このレッスンで学んだこと</div>
    <div class="concept-text">まとめ</div>
  </div>

  <div class="summary-list">
    <div class="summary-item">
      <div class="summary-num">1</div>
      <div class="summary-text">疑問文は <strong style="color: var(--blue);">be動詞を先頭</strong> に出して「?」をつける</div>
    </div>
    <div class="summary-item">
      <div class="summary-num">2</div>
      <div class="summary-text">Yes なら <strong style="color: var(--green);">主語 + be動詞</strong>、No なら <strong style="color: var(--wrong);">主語 + be動詞 + not</strong></div>
    </div>
  </div>

  <div class="point-box">💡 この2つが身についたら演習に進もう！</div>
<script src="../../ai-chat.js"></script>
</body>
</html>
