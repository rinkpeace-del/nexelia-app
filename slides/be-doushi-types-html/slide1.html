<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #1A56DB;
  --blue-light: #E8F0FE;
  --sub: #888;
  --border: #E8E8E8;
  --bg: #F9F9F9;
  --text: #1A1A1A;
  --white: #FFFFFF;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #fff;
  color: var(--text);
  padding: 36px 44px 52px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  overflow: auto;
  scrollbar-width: none;
}
body::-webkit-scrollbar { display: none; }
.slide-label { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; color: var(--blue); }
.concept-title { font-size: 13px; font-weight: 600; color: var(--sub); margin-bottom: 6px; }
.concept-text { font-size: 24px; font-weight: 700; line-height: 1.4; }
.concept-text .accent { color: var(--blue); }
.diagram {
  background: var(--bg);
  border-radius: 14px;
  padding: 22px 26px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.diagram-title { font-size: 12px; font-weight: 700; letter-spacing: 0.05em; color: var(--sub); }
.eq-row {
  display: flex;
  align-items: stretch;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  font-size: 16px;
  font-weight: 700;
}
.eq-cell { flex: 1; padding: 14px 16px; text-align: center; line-height: 1.5; border-right: 1px solid var(--border); }
.eq-cell:last-child { border-right: none; }
.eq-cell.be { color: var(--blue); }
.eq-label { font-size: 12px; color: var(--sub); text-align: center; }
.subj-row {
  display: flex;
  align-items: center;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  font-size: 16px;
  font-weight: 700;
}
.subj-cell { flex: 1; padding: 14px 18px; background: var(--white); border-right: 1px solid var(--border); }
.subj-cell .sub-label { font-size: 11px; color: var(--sub); font-weight: 500; display: block; margin-bottom: 3px; }
.subj-arrow { padding: 14px 16px; color: var(--sub); font-size: 18px; background: var(--white); border-right: 1px solid var(--border); }
.subj-be { flex: 0 0 100px; padding: 14px 18px; background: var(--blue-light); text-align: center; }
.subj-be .sub-label { font-size: 11px; color: var(--sub); font-weight: 500; display: block; margin-bottom: 3px; }
.subj-be .be-word { color: var(--blue); font-size: 20px; }
.examples { display: flex; flex-direction: column; gap: 8px; }
.ex-row { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; font-size: 14px; }
.ex-en { padding: 12px 16px; font-weight: 600; background: var(--white); border-right: 1px solid var(--border); line-height: 1.5; }
.ex-en .be { color: var(--blue); }
.ex-jp { padding: 12px 16px; color: var(--sub); background: var(--bg); line-height: 1.5; }
.summary-list { display: flex; flex-direction: column; gap: 10px; }
.summary-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; background: var(--white); border: 1px solid var(--border); border-radius: 10px; }
.summary-num { width: 24px; height: 24px; background: var(--blue); color: var(--white); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.summary-text { font-size: 15px; font-weight: 600; line-height: 1.6; }
.point-box { background: var(--blue-light); border-radius: 10px; padding: 14px 18px; font-size: 14px; color: var(--blue); font-weight: 600; line-height: 1.65; margin-top: auto; }
@media (max-width: 600px) {
  body { padding: 24px 20px 36px; gap: 18px; }
  .ex-row { grid-template-columns: 1fr; }
  .ex-en { border-right: none; border-bottom: 1px solid var(--border); }
}
</style>
</head>
<body><div class="slide-label">be動詞の種類 · スライド 1</div>
<div>
  <div class="concept-title">このスライドで学ぶこと</div>
  <div class="concept-text">be動詞の<span class="accent">種類</span></div>
</div>
<div class="diagram">
  <div class="diagram-title">be動詞は3種類ある</div>
  <div style="font-size:15px;color:var(--sub);line-height:1.8;margin-bottom:8px;">
    be動詞には <strong style="color:var(--blue)">am / is / are</strong> の3つがあります。<br>
    形は違っても、意味はすべて <strong style="color:var(--text)">「＝」</strong> です。
  </div>
  <div class="eq-row">
    <div class="eq-cell be" style="font-size:22px;">am</div>
    <div class="eq-cell be" style="font-size:22px;">is</div>
    <div class="eq-cell be" style="font-size:22px;">are</div>
  </div>
  <div class="eq-label">3つとも意味は「＝（イコール）」</div>
</div>
<div class="point-box">💡 形が3つあるのは主語によって使い分けるから。次で詳しく見てみよう！</div><script src="../../ai-chat.js"></script>
</body></html>
